<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phattarawech Chotisomran's Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f8f8f7;
      --border: #ebebea;
      --border-active: #111;
      --text: #111111;
      --muted: #8a8a87;
      --subtle: #c8c8c4;
      --error: #c13030;
      --success: #1f7a50;
      --tag: #f0f0ee;
      --radius: 9px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      font-family: 'Geist', 'Noto Sans Thai', 'Noto Sans JP', sans-serif;
    }

    .page {
      width: 100%;
      max-width: 420px;
      padding: 28px 24px;
      animation: rise 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Lang switcher ── */
    .lang-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 36px;
    }

    .lang-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      font-family: 'Geist', sans-serif;
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .lang-btn.active {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .lang-btn:not(.active):hover {
      color: var(--text);
      border-color: #bbb;
    }

    /* ── Header ── */
    .header { margin-bottom: 40px; }

    .workspace-label {
      font-family: 'Geist', sans-serif;
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .project-name {
      font-family: 'Geist', sans-serif;
      font-size: 23px;
      font-weight: 650;
      letter-spacing: -0.5px;
      line-height: 1.2;
      color: var(--text);
    }

    .project-tagline {
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 30px;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      padding: 10px 0;
      font-family: 'Geist', 'Noto Sans Thai', 'Noto Sans JP', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn.active  { color: var(--text); border-bottom-color: var(--text); }
    .tab-btn:not(.active):hover { color: var(--text); }

    /* ── Form sections ── */
    .form-section { display: none; }
    .form-section.active {
      display: block;
      animation: slideIn 0.22s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .section-title {
      font-family: 'Geist', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      margin-bottom: 4px;
    }

    .section-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 24px;
    }

    /* ── Alert ── */
    .alert {
      display: none;
      font-size: 13px;
      line-height: 1.5;
      padding: 11px 14px;
      border-radius: var(--radius);
      margin-bottom: 20px;
      border: 1px solid;
    }

    .alert.show   { display: block; }
    .alert.error  { color: var(--error);   border-color: #f4caca; background: #fdf5f5; }
    .alert.ok     { color: var(--success); border-color: #b6dfc9; background: #f2faf6; }

    /* ── Field ── */
    .field { margin-bottom: 15px; }

    label {
      display: block;
      font-family: 'Geist', sans-serif;
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 0.2px;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .optional {
      font-weight: 400;
      color: var(--subtle);
      margin-left: 2px;
    }

    .input-wrap { position: relative; }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 14px;
      color: var(--text);
      font-family: 'Geist', 'Noto Sans Thai', 'Noto Sans JP', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      border-color: var(--border-active);
      box-shadow: 0 0 0 3px rgba(17,17,17,0.06);
    }

    input::placeholder { color: var(--subtle); }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--subtle);
      font-family: 'Geist', sans-serif;
      font-size: 11.5px;
      font-weight: 500;
      padding: 2px 4px;
      transition: color 0.15s;
    }

    .toggle-pw:hover { color: var(--text); }

    .err-text {
      display: none;
      font-size: 12px;
      color: var(--error);
      margin-top: 5px;
    }

    .err-text.show { display: block; }

    /* ── Strength bar ── */
    .str-bar { display: flex; gap: 4px; margin-top: 8px; }

    .seg {
      height: 2px;
      flex: 1;
      background: var(--border);
      border-radius: 2px;
      transition: background 0.25s;
    }

    .seg.w { background: #d94040; }
    .seg.m { background: #d4952a; }
    .seg.s { background: #2a9e6a; }

    .str-note {
      font-family: 'Geist', sans-serif;
      font-size: 11px;
      color: var(--muted);
      margin-top: 5px;
    }

    /* ── Primary button ── */
    .btn {
      width: 100%;
      margin-top: 22px;
      padding: 12px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'Geist', 'Noto Sans Thai', 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: -0.1px;
    }

    .btn:hover  { opacity: 0.8; }
    .btn:active { transform: scale(0.99); }

    /* ── Footer ── */
    .footer-note {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-family: 'Geist', sans-serif;
      font-size: 12px;
      color: var(--muted);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2a9e6a;
      flex-shrink: 0;
      animation: blink 2.4s ease infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* ── Dashboard ── */
    .dashboard { display: none; }
    .dashboard.active { display: block; animation: rise 0.45s ease both; }

    .dash-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 36px;
    }

    .dash-greeting {
      font-family: 'Geist', sans-serif;
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .dash-name {
      font-family: 'Geist', sans-serif;
      font-size: 24px;
      font-weight: 650;
      letter-spacing: -0.5px;
    }

    .btn-out {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 14px;
      border-radius: 7px;
      font-family: 'Geist', 'Noto Sans Thai', 'Noto Sans JP', sans-serif;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-out:hover { border-color: var(--error); color: var(--error); }

    .modules-label {
      font-family: 'Geist', sans-serif;
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .modules { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .mod {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .mod:hover { border-color: var(--text); background: var(--surface); }
    .mod.dim   { opacity: 0.32; cursor: default; pointer-events: none; }

    .mod-name {
      font-family: 'Geist', 'Noto Sans Thai', 'Noto Sans JP', sans-serif;
      font-size: 13.5px;
      font-weight: 600;
      letter-spacing: -0.2px;
      margin-bottom: 3px;
    }

    .mod-sub {
      font-family: 'Geist', sans-serif;
      font-size: 11.5px;
      color: var(--muted);
    }

    .soon {
      display: inline-block;
      margin-top: 8px;
      font-family: 'Geist', sans-serif;
      font-size: 10px;
      font-weight: 500;
      background: var(--tag);
      color: var(--muted);
      padding: 2px 7px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

<!-- ═══════════ AUTH PAGE ═══════════ -->
<div class="page" id="authPage">

  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('th')">TH</button>
    <button class="lang-btn"        onclick="setLang('en')">EN</button>
    <button class="lang-btn"        onclick="setLang('ja')">JA</button>
  </div>

  <div class="header">
    <div class="workspace-label">Personal Workspace</div>
    <div class="project-name">Phattarawech Chotisomran's Project</div>
    <div class="project-tagline" id="tagline"></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabLogin"    onclick="switchTab('login')"></button>
    <button class="tab-btn"        id="tabRegister" onclick="switchTab('register')"></button>
  </div>

  <!-- LOGIN -->
  <div class="form-section active" id="loginSection">
    <div class="section-title" id="loginTitle"></div>
    <div class="section-sub"   id="loginSub"></div>

    <div class="alert error" id="loginAlert"><span id="loginAlertMsg"></span></div>

    <div class="field">
      <label id="lblLoginUser"></label>
      <input type="text"     id="loginUser" autocomplete="username">
    </div>

    <div class="field">
      <label id="lblLoginPw"></label>
      <div class="input-wrap">
        <input type="password" id="loginPw" autocomplete="current-password">
        <button class="toggle-pw" id="toggleLoginPw" onclick="togglePw('loginPw','toggleLoginPw')"></button>
      </div>
    </div>

    <button class="btn" id="btnLogin" onclick="doLogin()"></button>
  </div>

  <!-- REGISTER -->
  <div class="form-section" id="registerSection">
    <div class="section-title" id="regTitle"></div>
    <div class="section-sub"   id="regSub"></div>

    <div class="alert error" id="regAlert"><span id="regAlertMsg"></span></div>

    <div class="field">
      <label id="lblRegUser"></label>
      <input type="text" id="regUser" oninput="valUser()" autocomplete="username">
      <div class="err-text" id="userErr"></div>
    </div>

    <div class="field">
      <label id="lblRegDisplay"></label>
      <input type="text" id="regDisplay" autocomplete="name">
    </div>

    <div class="field">
      <label id="lblRegPw"></label>
      <div class="input-wrap">
        <input type="password" id="regPw" oninput="checkStr()" autocomplete="new-password">
        <button class="toggle-pw" id="toggleRegPw" onclick="togglePw('regPw','toggleRegPw')"></button>
      </div>
      <div class="str-bar">
        <div class="seg" id="s1"></div>
        <div class="seg" id="s2"></div>
        <div class="seg" id="s3"></div>
        <div class="seg" id="s4"></div>
      </div>
      <div class="str-note" id="strNote"></div>
    </div>

    <div class="field">
      <label id="lblRegCf"></label>
      <div class="input-wrap">
        <input type="password" id="regCf" oninput="checkCf()" autocomplete="new-password">
        <button class="toggle-pw" id="toggleRegCf" onclick="togglePw('regCf','toggleRegCf')"></button>
      </div>
      <div class="err-text" id="cfErr"></div>
    </div>

    <button class="btn" id="btnRegister" onclick="doRegister()"></button>
  </div>

  <div class="footer-note">
    <div class="dot"></div>
    <span id="userCount"></span>
  </div>
</div>

<!-- ═══════════ DASHBOARD ═══════════ -->
<div class="page dashboard" id="dashboard">

  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('th')">TH</button>
    <button class="lang-btn"        onclick="setLang('en')">EN</button>
    <button class="lang-btn"        onclick="setLang('ja')">JA</button>
  </div>

  <div class="dash-top">
    <div>
      <div class="dash-greeting" id="dashGreeting"></div>
      <div class="dash-name"     id="dashName">—</div>
    </div>
    <button class="btn-out" id="btnLogout" onclick="doLogout()"></button>
  </div>

  <div class="modules-label" id="modulesLabel"></div>

  <div class="modules">
    <div class="mod">
      <div class="mod-name" id="mod1Name"></div>
      <div class="mod-sub">Tasks &amp; to-do list</div>
    </div>
    <div class="mod">
      <div class="mod-name" id="mod2Name"></div>
      <div class="mod-sub">Notes &amp; references</div>
    </div>
    <div class="mod dim">
      <div class="mod-name" id="mod3Name"></div>
      <div class="mod-sub">Progress tracking</div>
      <div class="soon" id="soonLabel1"></div>
    </div>
    <div class="mod dim">
      <div class="mod-name" id="mod4Name"></div>
      <div class="mod-sub">Stats &amp; overview</div>
      <div class="soon" id="soonLabel2"></div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
//  Translation dictionary
// ─────────────────────────────────────────
const TR = {
  tagline:       { th: 'พื้นที่ทำงานและคลังความรู้ส่วนตัว', en: 'Your personal knowledge & work hub', ja: '個人のナレッジ・ワークスペース' },
  tabLogin:      { th: 'เข้าสู่ระบบ',   en: 'Sign In',         ja: 'ログイン' },
  tabRegister:   { th: 'สมัครสมาชิก',  en: 'Create Account',  ja: 'アカウント作成' },

  loginTitle:    { th: 'ยินดีต้อนรับกลับ', en: 'Welcome back', ja: 'おかえりなさい' },
  loginSub:      { th: 'เข้าสู่พื้นที่งานและความรู้ของคุณ', en: 'Sign in to access your workspace', ja: 'ワークスペースにサインインしてください' },
  lblLoginUser:  { th: 'ชื่อผู้ใช้', en: 'Username', ja: 'ユーザー名' },
  lblLoginPw:    { th: 'รหัสผ่าน', en: 'Password', ja: 'パスワード' },
  btnLogin:      { th: 'เข้าสู่ระบบ', en: 'Sign In', ja: 'ログイン' },

  regTitle:      { th: 'สร้างบัญชีใหม่', en: 'Create your account', ja: 'アカウントを作成' },
  regSub:        { th: 'ใช้แค่ชื่อผู้ใช้และรหัสผ่าน ไม่ต้องใช้อีเมล', en: 'No email required — just a username & password', ja: 'メール不要 — ユーザー名とパスワードのみ' },
  lblRegUser:    { th: 'ชื่อผู้ใช้', en: 'Username', ja: 'ユーザー名' },
  lblRegDisplay: { th: 'ชื่อที่แสดง (ไม่บังคับ)', en: 'Display Name (optional)', ja: '表示名（任意）' },
  lblRegPw:      { th: 'รหัสผ่าน', en: 'Password', ja: 'パスワード' },

  errNotFound: { th: 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง', en: 'Incorrect username or password', ja: 'ユーザー名またはパスワードが違います' },

  errCreated:  { th: 'สร้างบัญชีสำเร็จ กำลังเข้าสู่ระบบ...', en: 'Account created! Signing you in...', ja: 'アカウントを作成しました。ログイン中...' },

  strWeak:   { th: 'ความปลอดภัย: อ่อน', en: 'Strength: Weak', ja: '強度：弱い' },
  strMedium: { th: 'ความปลอดภัย: ปานกลาง', en: 'Strength: Fair', ja: '強度：普通' },
  strGood:   { th: 'ความปลอดภัย: ดี', en: 'Strength: Good', ja: '強度：良い' },
  strStrong: { th: 'ความปลอดภัย: แข็งแกร่ง', en: 'Strength: Strong', ja: '強度：強い' },

// ─────────────────────────────────────────
//  State
// ─────────────────────────────────────────
let lang = 'th';
const pwState = {}; // track show/hide per input id

// ─────────────────────────────────────────
//  Storage
// ─────────────────────────────────────────
const getUsers   = () => { try { return JSON.parse(localStorage.getItem('pc_users') || '[]'); } catch { return []; } };
const saveUsers  = u  => localStorage.setItem('pc_users', JSON.stringify(u));
const getSession = () => { try { return JSON.parse(sessionStorage.getItem('pc_sess') || 'null'); } catch { return null; } };
const setSession = u  => sessionStorage.setItem('pc_sess', JSON.stringify(u));
const clrSession = () => sessionStorage.removeItem('pc_sess');

// ─────────────────────────────────────────
//  i18n helper
// ─────────────────────────────────────────
function tr(key, arg) {
  const val = TR[key]?.[lang];
  if (typeof val === 'function') return val(arg);
  return val ?? '';
}

// ─────────────────────────────────────────
//  Apply all translations to DOM
// ─────────────────────────────────────────
function applyLang() {
  // simple text ids
  const ids = [
    'tagline','tabLogin','tabRegister',
    'loginTitle','loginSub','lblLoginUser','lblLoginPw','btnLogin',
    'regTitle','regSub','lblRegUser','lblRegDisplay','lblRegPw','lblRegCf','btnRegister',
    'dashGreeting','btnLogout','modulesLabel',
    'mod1Name','mod2Name','mod3Name','mod4Name',
  ];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = tr(id);
  });

  // soon labels
  ['soonLabel1','soonLabel2'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = tr('soonLabel');
  });

  // placeholders
  document.getElementById('loginUser').placeholder   = tr('phLoginUser');
  document.getElementById('loginPw').placeholder     = tr('phLoginPw');
  document.getElementById('regUser').placeholder     = tr('phRegUser');
  document.getElementById('regDisplay').placeholder  = tr('phRegDisplay');
  document.getElementById('regPw').placeholder       = tr('phRegPw');
  document.getElementById('regCf').placeholder       = tr('phRegCf');

  // toggle-pw buttons (show/hide)
  ['toggleLoginPw','toggleRegPw','toggleRegCf'].forEach(id => {
    const btn = document.getElementById(id);
    if (!btn) return;
    const showing = pwState[id] === true;
    btn.textContent = showing ? tr('hide') : tr('show');
  });

  // user count
  updateCount();

  // strength note (re-render if visible)
  checkStr();

  // lang bar: sync both bars
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === lang.toUpperCase());
  });
}

// ─────────────────────────────────────────
//  setLang
// ─────────────────────────────────────────
function setLang(l) {
  lang = l;
  applyLang();
}

// ─────────────────────────────────────────
//  Tab switch
// ─────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('loginSection').classList.toggle('active', tab === 'login');
  document.getElementById('registerSection').classList.toggle('active', tab === 'register');
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
  hideAlert('loginAlert');
  hideAlert('regAlert');
}

// ─────────────────────────────────────────
//  Alerts
// ─────────────────────────────────────────
function showAlert(id, msg, type = 'error') {
  const el = document.getElementById(id);
  el.className = `alert ${type} show`;
  el.querySelector('span').textContent = msg;
}

function hideAlert(id) {
  document.getElementById(id).classList.remove('show');
}

// ─────────────────────────────────────────
//  Toggle password visibility
// ─────────────────────────────────────────
function togglePw(inputId, btnId) {
  const inp = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  const showing = inp.type === 'text';
  inp.type = showing ? 'password' : 'text';
  pwState[btnId] = !showing;
  btn.textContent = !showing ? tr('hide') : tr('show');
}

// ─────────────────────────────────────────
//  User count
// ─────────────────────────────────────────
function updateCount() {
  const n = getUsers().length;
  const el = document.getElementById('userCount');
  if (!el) return;
  el.textContent = n === 0 ? tr('userCountNone') : tr('userCountN', n);
}

// ─────────────────────────────────────────
//  Validation
// ─────────────────────────────────────────
function valUser() {
  const v  = document.getElementById('regUser').value.trim();
  const el = document.getElementById('userErr');
  let msg  = '';
  if (v && v.length < 3)                       msg = tr('errShort3');
  else if (v && !/^[a-zA-Z0-9ก-๙_]+$/.test(v)) msg = tr('errChars');
  el.textContent = msg;
  el.classList.toggle('show', !!msg);
}

function checkStr() {
  const pw   = document.getElementById('regPw')?.value ?? '';
  const segs = [1,2,3,4].map(i => document.getElementById('s' + i));
  if (!segs[0]) return;
  segs.forEach(s => s.className = 'seg');
  const note = document.getElementById('strNote');
  if (!pw) { note.textContent = ''; return; }
  let sc = 0;
  if (pw.length >= 6)               sc++;
  if (pw.length >= 10)              sc++;
  if (/[A-Z]/.test(pw) || /\d/.test(pw)) sc++;
  if (/[^A-Za-z0-9]/.test(pw))     sc++;
  const cls    = ['w','w','m','s'];
  const labels = [null,'strWeak','strMedium','strGood','strStrong'];
  for (let i = 0; i < sc; i++) segs[i].classList.add(cls[sc - 1]);
  note.textContent = labels[sc] ? tr(labels[sc]) : '';
}

function checkCf() {
  const match = document.getElementById('regPw').value === document.getElementById('regCf').value;
  const cf    = document.getElementById('regCf').value;
  const el    = document.getElementById('cfErr');
  el.textContent = cf && !match ? tr('errNoMatch') : '';
  el.classList.toggle('show', !!cf && !match);
}

// ─────────────────────────────────────────
//  Hash (lightweight, not crypto)
// ─────────────────────────────────────────
function hashPw(pw) {
  let h = 5381;
  for (let i = 0; i < pw.length; i++) h = (h * 33) ^ pw.charCodeAt(i);
  return (h >>> 0).toString(36) + pw.length;
}

// ─────────────────────────────────────────
//  Auth actions
// ─────────────────────────────────────────
function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPw').value;
  if (!u || !p) { showAlert('loginAlert', tr('errEmpty')); return; }
  const user = getUsers().find(x => x.username.toLowerCase() === u.toLowerCase() && x.password === hashPw(p));
  if (!user) {
    showAlert('loginAlert', tr('errNotFound'));
    document.getElementById('loginPw').value = '';
    return;
  }
  setSession({ username: user.username, displayName: user.displayName });
  showDash(user);
}

function doRegister() {
  const u  = document.getElementById('regUser').value.trim();
  const dn = document.getElementById('regDisplay').value.trim() || u;
  const p  = document.getElementById('regPw').value;
  const cf = document.getElementById('regCf').value;
  if (!u || !p || !cf)     { showAlert('regAlert', tr('errEmpty'));   return; }
  if (u.length < 3)        { showAlert('regAlert', tr('errShort3'));  return; }
  if (p.length < 6)        { showAlert('regAlert', tr('errShort6'));  return; }
  if (p !== cf)            { showAlert('regAlert', tr('errNoMatch')); return; }
  const users = getUsers();
  if (users.find(x => x.username.toLowerCase() === u.toLowerCase())) {
    showAlert('regAlert', tr('errTaken')); return;
  }
  const nu = { username: u, displayName: dn, password: hashPw(p), createdAt: new Date().toISOString() };
  users.push(nu);
  saveUsers(users);
  showAlert('regAlert', tr('errCreated'), 'ok');
  setTimeout(() => { setSession({ username: u, displayName: dn }); showDash(nu); }, 1100);
}

function doLogout() {
  clrSession();
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('authPage').style.display = '';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPw').value   = '';
  switchTab('login');
}

function showDash(user) {
  document.getElementById('authPage').style.display = 'none';
  document.getElementById('dashboard').classList.add('active');
  document.getElementById('dashName').textContent = user.displayName || user.username;
}

// ─────────────────────────────────────────
//  Init
// ─────────────────────────────────────────
setLang('th');          // apply all translations on load
const sess = getSession();
if (sess) showDash(sess);

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('loginSection').classList.contains('active')) doLogin();
  else doRegister();
});
</script>
