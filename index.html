<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phattarawech Chotisomran's Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fff;--surface:#f8f8f7;--surface2:#f0f0ee;
  --border:#e8e8e6;--border2:#d4d4d0;
  --text:#111;--muted:#8a8a87;--subtle:#c4c4c0;
  --error:#c13030;--ok:#1f7a50;--blue:#2563eb;
  --r:9px;--font:'Geist','Noto Sans Thai','Noto Sans JP',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
body.page-open{align-items:flex-start;padding:0}

/* screens */
.screen{display:none;width:100%;animation:rise .4s cubic-bezier(.22,1,.36,1) both}
.screen.on{display:block}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* wrappers */
.wrap-sm{max-width:420px;margin:0 auto;padding:28px 24px}
.wrap-md{max-width:560px;margin:0 auto;padding:28px 24px}
.wrap-lg{max-width:700px;margin:0 auto;padding:28px 24px;min-height:100vh}

/* lang bar */
.lang-bar{display:flex;gap:4px;margin-bottom:32px}
.lb{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-family:var(--font);font-size:11.5px;font-weight:600;letter-spacing:.5px;color:var(--muted);cursor:pointer;transition:.15s all}
.lb.on{background:var(--text);color:#fff;border-color:var(--text)}
.lb:not(.on):hover{color:var(--text);border-color:#bbb}

/* header */
.hdr{margin-bottom:36px}
.hdr-label{font-size:10.5px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.hdr-name{font-size:22px;font-weight:650;letter-spacing:-.5px;line-height:1.25}
.hdr-tag{font-size:13px;color:var(--muted);margin-top:5px}

/* tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px}
.tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;padding:10px 0;font-family:var(--font);font-size:13.5px;font-weight:500;color:var(--muted);cursor:pointer;transition:.15s}
.tab.on{color:var(--text);border-bottom-color:var(--text)}
.tab:not(.on):hover{color:var(--text)}

/* form section */
.fsec{display:none}.fsec.on{display:block;animation:sli .2s ease both}
@keyframes sli{from{opacity:0;transform:translateX(6px)}to{opacity:1;transform:translateX(0)}}
.ftitle{font-size:15px;font-weight:600;letter-spacing:-.2px;margin-bottom:4px}
.fsub{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:22px}

/* alert */
.alert{display:none;font-size:13px;line-height:1.5;padding:10px 14px;border-radius:var(--r);margin-bottom:18px;border:1px solid}
.alert.on{display:block}
.alert.err{color:var(--error);border-color:#f4caca;background:#fdf5f5}
.alert.ok{color:var(--ok);border-color:#b6dfc9;background:#f2faf6}

/* field */
.field{margin-bottom:14px}
label{display:block;font-size:11.5px;font-weight:500;letter-spacing:.2px;color:var(--muted);margin-bottom:7px}
.iw{position:relative}
input[type=text],input[type=password]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:.15s border-color,.15s box-shadow}
input:focus{border-color:var(--text);box-shadow:0 0 0 3px rgba(17,17,17,.06)}
input::placeholder{color:var(--subtle)}
textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;resize:vertical;min-height:72px;transition:.15s border-color}
textarea:focus{border-color:var(--text);box-shadow:0 0 0 3px rgba(17,17,17,.06)}
textarea::placeholder{color:var(--subtle)}
.tpw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--subtle);font-family:var(--font);font-size:11.5px;font-weight:500;padding:2px 4px;transition:.15s color}
.tpw:hover{color:var(--text)}
.etxt{display:none;font-size:12px;color:var(--error);margin-top:5px}.etxt.on{display:block}

/* strength */
.str-bar{display:flex;gap:4px;margin-top:8px}
.seg{height:2px;flex:1;background:var(--border);border-radius:2px;transition:.25s background}
.seg.w{background:#d94040}.seg.m{background:#d4952a}.seg.s{background:#2a9e6a}
.str-note{font-size:11px;color:var(--muted);margin-top:5px}

/* buttons */
.btn{width:100%;margin-top:20px;padding:12px;background:var(--text);color:#fff;border:none;border-radius:var(--r);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:.15s opacity,.1s transform;letter-spacing:-.1px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{opacity:.8}.btn:active{transform:scale(.99)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-sm{padding:8px 14px;font-size:13px;font-weight:500;width:auto;margin-top:0;border-radius:7px}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);opacity:1}
.btn-danger{background:none;border:1px solid #f4caca;color:var(--error)}
.btn-danger:hover{background:#fdf5f5;opacity:1}

/* footer */
.fn{display:flex;align-items:center;gap:8px;margin-top:26px;padding-top:18px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
.dot{width:6px;height:6px;border-radius:50%;background:#2a9e6a;flex-shrink:0;animation:blink 2.4s ease infinite}
.dot.offline{background:#d94040}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* dashboard */
.dash-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:36px}
.dash-greeting{font-size:10.5px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.dash-name{font-size:24px;font-weight:650;letter-spacing:-.5px}
.sec-label{font-size:10.5px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.modules{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mod{border:1px solid var(--border);border-radius:10px;padding:18px;cursor:pointer;transition:.15s border-color,.15s background}
.mod:hover{border-color:var(--text);background:var(--surface)}
.mod.dim{opacity:.3;cursor:default;pointer-events:none}
.mod-name{font-size:13.5px;font-weight:600;letter-spacing:-.2px;margin-bottom:3px}
.mod-sub{font-size:11.5px;color:var(--muted)}
.soon{display:inline-block;margin-top:8px;font-size:10px;font-weight:500;background:var(--surface2);color:var(--muted);padding:2px 7px;border-radius:4px}

/* module page */
.mod-header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.back-btn{background:none;border:1px solid var(--border);border-radius:7px;padding:7px 12px;font-family:var(--font);font-size:12.5px;font-weight:500;color:var(--muted);cursor:pointer;transition:.15s all;flex-shrink:0}
.back-btn:hover{border-color:var(--text);color:var(--text)}
.mod-title{font-size:20px;font-weight:650;letter-spacing:-.4px}

/* add card */
.add-card{border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px;background:var(--surface)}
.add-card-title{font-size:10.5px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.type-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.type-chip{border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:.15s all;background:none;font-family:var(--font)}
.type-chip.on{background:var(--text);color:#fff;border-color:var(--text)}

/* drop zone */
.drop-zone{border:2px dashed var(--border2);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:.15s all;background:var(--bg)}
.drop-zone:hover,.drop-zone.drag{border-color:var(--text);background:var(--surface)}
.drop-zone input{display:none}
.drop-icon{font-size:26px;margin-bottom:6px}
.drop-hint{font-size:12.5px;color:var(--muted);line-height:1.5}
.file-preview{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.fp-item{position:relative;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface2)}
.fp-item img{width:68px;height:68px;object-fit:cover;display:block}
.fp-file{width:80px;height:68px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;color:var(--muted);padding:6px;word-break:break-all;text-align:center}
.fp-del{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}

/* items */
.items-list{display:flex;flex-direction:column;gap:10px}
.item-card{border:1px solid var(--border);border-radius:10px;padding:16px;background:var(--bg);transition:.15s}
.item-card:hover{border-color:var(--border2)}
.item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.item-title{font-size:14px;font-weight:600;letter-spacing:-.1px;flex:1}
.item-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--subtle);font-size:15px;padding:3px 5px;border-radius:5px;transition:.15s}
.icon-btn:hover{color:var(--text);background:var(--surface2)}
.item-body{margin-top:8px;font-size:13px;color:var(--muted);line-height:1.6;white-space:pre-wrap;word-break:break-word}
.item-meta{display:flex;gap:6px;align-items:center;margin-top:10px;flex-wrap:wrap}
.tag{font-size:10.5px;font-weight:500;padding:2px 8px;border-radius:4px;background:var(--surface2);color:var(--muted)}
.tag.task{background:#fef3c7;color:#92400e}
.tag.note{background:#dbeafe;color:#1e40af}
.tag.link{background:#f0fdf4;color:#166534}
.tag.video{background:#fce7f3;color:#9d174d}
.tag.file{background:#f3f4f6;color:#374151}
.item-date{font-size:10.5px;color:var(--subtle);margin-left:auto}
.item-images{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.item-images img{width:76px;height:76px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer;transition:.15s}
.item-images img:hover{transform:scale(1.04)}
.item-files{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.file-chip{display:flex;align-items:center;gap:5px;border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--muted);text-decoration:none;transition:.15s}
.file-chip:hover{border-color:var(--text);color:var(--text)}
.item-link a{display:inline-block;margin-top:8px;color:var(--blue);font-size:13px;word-break:break-all;text-decoration:none}
.item-link a:hover{text-decoration:underline}
.yt-wrap{margin-top:10px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.yt-wrap iframe{display:block;width:100%;aspect-ratio:16/9;border:none}
.task-check{display:flex;align-items:center;gap:10px}
.task-check input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--text)}
.task-done .item-title{text-decoration:line-through;color:var(--subtle)}
.empty{text-align:center;padding:48px 24px;color:var(--subtle)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.empty-txt{font-size:14px}

/* ── SHARE MODULE ── */
.share-section{margin-top:20px}
.share-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.share-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg)}
.share-avatar{width:32px;height:32px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--muted);flex-shrink:0;text-transform:uppercase}
.share-info{flex:1}
.share-name{font-size:13px;font-weight:600}
.share-meta{font-size:11.5px;color:var(--muted);margin-top:1px}
.share-badge{font-size:10.5px;font-weight:500;padding:2px 8px;border-radius:4px;background:#dbeafe;color:#1e40af}

/* viewer banner */
.viewer-banner{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}
.viewer-banner strong{color:var(--text)}

/* search dropdown */
.search-wrap{position:relative}
.search-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 8px 24px rgba(0,0,0,.08);z-index:100;max-height:200px;overflow-y:auto;display:none}
.search-dropdown.on{display:block}
.search-item{padding:10px 14px;cursor:pointer;font-size:13px;transition:.12s background}
.search-item:hover{background:var(--surface)}
.search-item-name{font-weight:500}
.search-item-user{font-size:11.5px;color:var(--muted);margin-top:1px}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:.3s all;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* lightbox */
.lb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9998;align-items:center;justify-content:center;cursor:zoom-out}
.lb-overlay.on{display:flex}
.lb-overlay img{max-width:90vw;max-height:90vh;border-radius:8px;object-fit:contain}

/* spinner */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="lb-overlay" id="lbOverlay" onclick="closeLB()"><img id="lbImg" src="" alt=""></div>

<!-- ══════════ AUTH ══════════ -->
<div class="screen on" id="scrAuth">
<div class="wrap-sm">
  <div class="lang-bar">
    <button class="lb on" onclick="setLang('th')">TH</button>
    <button class="lb"    onclick="setLang('en')">EN</button>
    <button class="lb"    onclick="setLang('ja')">JA</button>
  </div>
  <div class="hdr">
    <div class="hdr-label">Personal Workspace</div>
    <div class="hdr-name">Phattarawech Chotisomran's Project</div>
    <div class="hdr-tag" id="tagline"></div>
  </div>
  <div class="tabs">
    <button class="tab on" id="tabLogin"    onclick="switchTab('login')"></button>
    <button class="tab"    id="tabRegister" onclick="switchTab('register')"></button>
  </div>
  <div class="fsec on" id="secLogin">
    <div class="ftitle" id="loginTitle"></div>
    <div class="fsub"   id="loginSub"></div>
    <div class="alert err" id="loginAlert"><span></span></div>
    <div class="field"><label id="lbLoginUser"></label><input type="text" id="loginUser" autocomplete="username"></div>
    <div class="field"><label id="lbLoginPw"></label>
      <div class="iw"><input type="password" id="loginPw" autocomplete="current-password">
        <button class="tpw" id="tpwLogin" onclick="togglePw('loginPw','tpwLogin')"></button></div></div>
    <button class="btn" id="btnLogin" onclick="doLogin()"></button>
  </div>
  <div class="fsec" id="secRegister">
    <div class="ftitle" id="regTitle"></div>
    <div class="fsub"   id="regSub"></div>
    <div class="alert err" id="regAlert"><span></span></div>
    <div class="field"><label id="lbRegUser"></label>
      <input type="text" id="regUser" oninput="valUser()" autocomplete="username">
      <div class="etxt" id="userErr"></div></div>
    <div class="field"><label id="lbRegDisplay"></label><input type="text" id="regDisplay" autocomplete="name"></div>
    <div class="field"><label id="lbRegPw"></label>
      <div class="iw"><input type="password" id="regPw" oninput="checkStr()" autocomplete="new-password">
        <button class="tpw" id="tpwReg" onclick="togglePw('regPw','tpwReg')"></button></div>
      <div class="str-bar"><div class="seg" id="s1"></div><div class="seg" id="s2"></div><div class="seg" id="s3"></div><div class="seg" id="s4"></div></div>
      <div class="str-note" id="strNote"></div></div>
    <div class="field"><label id="lbRegCf"></label>
      <div class="iw"><input type="password" id="regCf" oninput="checkCf()" autocomplete="new-password">
        <button class="tpw" id="tpwCf" onclick="togglePw('regCf','tpwCf')"></button></div>
      <div class="etxt" id="cfErr"></div></div>
    <button class="btn" id="btnRegister" onclick="doRegister()"></button>
  </div>
  <div class="fn"><div class="dot" id="connDot"></div><span id="connStatus"></span></div>
</div>
</div>

<!-- ══════════ DASHBOARD ══════════ -->
<div class="screen" id="scrDash">
<div class="wrap-md">
  <div class="lang-bar">
    <button class="lb on" onclick="setLang('th')">TH</button>
    <button class="lb"    onclick="setLang('en')">EN</button>
    <button class="lb"    onclick="setLang('ja')">JA</button>
  </div>
  <div class="dash-top">
    <div>
      <div class="dash-greeting" id="dashGreeting"></div>
      <div class="dash-name" id="dashName">—</div>
    </div>
    <button class="btn btn-sm btn-ghost" id="btnLogout" onclick="doLogout()"></button>
  </div>
  <div class="sec-label" id="modulesLabel"></div>
  <div class="modules">
    <div class="mod" onclick="openModule('tasks')">
      <div class="mod-name" id="mod1Name"></div>
      <div class="mod-sub"  id="mod1Sub"></div>
    </div>
    <div class="mod" onclick="openModule('knowledge')">
      <div class="mod-name" id="mod2Name"></div>
      <div class="mod-sub"  id="mod2Sub"></div>
    </div>
    <div class="mod" onclick="openModule('share')">
      <div class="mod-name" id="mod3Name"></div>
      <div class="mod-sub"  id="mod3Sub"></div>
    </div>
    <div class="mod dim">
      <div class="mod-name" id="mod4Name"></div>
      <div class="mod-sub">Stats &amp; overview</div>
      <div class="soon" id="soonLabel"></div>
    </div>
  </div>
</div>
</div>

<!-- ══════════ TASKS ══════════ -->
<div class="screen" id="scrTasks">
<div class="wrap-lg">
  <div class="mod-header">
    <button class="back-btn" onclick="goBack()">← <span id="backTasks"></span></button>
    <div class="mod-title" id="taskPageTitle"></div>
  </div>
  <!-- viewer banner -->
  <div id="taskViewerBanner" style="display:none" class="viewer-banner">
    👁 <span id="taskViewerText"></span>
  </div>
  <!-- add card (hidden in viewer mode) -->
  <div class="add-card" id="taskAddCard">
    <div class="add-card-title" id="addTaskLabel"></div>
    <div class="field"><label id="lbTaskTitle"></label><input type="text" id="taskTitle"></div>
    <div class="field"><label id="lbTaskNote"></label><textarea id="taskNote" rows="3"></textarea></div>
    <div class="field">
      <label id="lbTaskFiles"></label>
      <div class="drop-zone" id="taskDrop" onclick="document.getElementById('taskFileIn').click()"
           ondrop="handleDrop(event,'task')" ondragover="onDragOver(event,'taskDrop')" ondragleave="onDragLeave('taskDrop')">
        <input type="file" id="taskFileIn" multiple accept="image/*,.pdf,.doc,.docx,.txt,.zip,.xls,.xlsx" onchange="handleFiles(event,'task')">
        <div class="drop-icon">📎</div>
        <div class="drop-hint" id="taskDropHint"></div>
      </div>
      <div class="file-preview" id="taskFilePreview"></div>
    </div>
    <div style="display:flex;justify-content:flex-end">
      <button class="btn btn-sm" id="btnAddTask" onclick="addTask()"></button>
    </div>
  </div>
  <div class="items-list" id="taskList"></div>
</div>
</div>

<!-- ══════════ KNOWLEDGE ══════════ -->
<div class="screen" id="scrKnowledge">
<div class="wrap-lg">
  <div class="mod-header">
    <button class="back-btn" onclick="goBack()">← <span id="backKnow"></span></button>
    <div class="mod-title" id="knowPageTitle"></div>
  </div>
  <div id="knowViewerBanner" style="display:none" class="viewer-banner">
    👁 <span id="knowViewerText"></span>
  </div>
  <div class="add-card" id="knowAddCard">
    <div class="add-card-title" id="addKnowLabel"></div>
    <div class="type-row">
      <button class="type-chip on" data-type="note"  onclick="pickType('note')"  id="chipNote"></button>
      <button class="type-chip"    data-type="link"  onclick="pickType('link')"  id="chipLink"></button>
      <button class="type-chip"    data-type="video" onclick="pickType('video')" id="chipVideo"></button>
      <button class="type-chip"    data-type="file"  onclick="pickType('file')"  id="chipFile"></button>

// ─── i18n ───
function tr(key, arg) {
  const v = TR[key]?.[lang];
  return typeof v === 'function' ? v(arg) : (v ?? '');
}

function applyLang() {
  const ids = [
    'tagline','tabLogin','tabRegister','loginTitle','loginSub','lbLoginUser','lbLoginPw','btnLogin',
    'regTitle','regSub','lbRegUser','lbRegDisplay','lbRegPw','lbRegCf','btnRegister',
    'dashGreeting','btnLogout','modulesLabel',
    'mod1Name','mod1Sub','mod2Name','mod2Sub','mod3Name','mod3Sub','mod4Name','soonLabel',
    'taskPageTitle','addTaskLabel','lbTaskTitle','lbTaskNote','lbTaskFiles','btnAddTask',
    'knowPageTitle','addKnowLabel','lbKnowTitle','lbKnowBody','lbKnowLink','lbKnowVideo','lbKnowFiles','btnAddKnow',
    'chipNote','chipLink','chipVideo','chipFile',
    'sharePageTitle','shareAddLabel','lbShareSearch','lbShareModule','smodAll','smodTasks','smodKnow','btnDoShare',
    'sharingWithLabel','sharedToMeLabel',
  ];
  ids.forEach(id => { const el=document.getElementById(id); if(el) el.textContent=tr(id); });
  ['backTasks','backKnow','backShare'].forEach(id=>{ const el=document.getElementById(id); if(el) el.textContent=tr('backBtn'); });

  const dh1=document.getElementById('taskDropHint'); if(dh1) dh1.innerHTML=tr('taskDropHint').replace(/\n/g,'<br>');
  const dh2=document.getElementById('knowDropHint'); if(dh2) dh2.textContent=tr('knowDropHint');
  const ph={loginUser:'phLoginUser',loginPw:'phLoginPw',regUser:'phRegUser',regDisplay:'phRegDisplay',regPw:'phRegPw',regCf:'phRegCf',shareSearch:'phShareSearch'};
  Object.entries(ph).forEach(([id,k])=>{ const el=document.getElementById(id); if(el) el.placeholder=tr(k); });
  ['tpwLogin','tpwReg','tpwCf'].forEach(id=>{const btn=document.getElementById(id);if(!btn)return;btn.textContent=pwState[id]?tr('hide'):tr('show');});
  document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.trim()===lang.toUpperCase()));
  checkStr();
}
function setLang(l){lang=l;applyLang();}

function valUser(){const v=document.getElementById('regUser').value.trim(),el=document.getElementById('userErr');let m='';if(v&&v.length<3)m=tr('errShort3');else if(v&&!/^[a-zA-Z0-9ก-๙_]+$/.test(v))m=tr('errChars');el.textContent=m;el.classList.toggle('on',!!m);}
function checkStr(){const pw=document.getElementById('regPw')?.value??'';const segs=[1,2,3,4].map(i=>document.getElementById('s'+i));if(!segs[0])return;segs.forEach(s=>s.className='seg');const note=document.getElementById('strNote');if(!pw){note.textContent='';return;}let sc=0;if(pw.length>=6)sc++;if(pw.length>=10)sc++;if(/[A-Z]/.test(pw)||/\d/.test(pw))sc++;if(/[^A-Za-z0-9]/.test(pw))sc++;const cls=['w','w','m','s'],lbls=[null,'strWeak','strMedium','strGood','strStrong'];for(let i=0;i<sc;i++)segs[i].classList.add(cls[sc-1]);note.textContent=lbls[sc]?tr(lbls[sc]):'';}
function checkCf(){const m=document.getElementById('regPw').value===document.getElementById('regCf').value,cf=document.getElementById('regCf').value,el=document.getElementById('cfErr');el.textContent=cf&&!m?tr('errNoMatch'):'';el.classList.toggle('on',!!cf&&!m);}

// ─── Hash ───
function hashPw(pw){let h=5381;for(let i=0;i<pw.length;i++)h=(h*33)^pw.charCodeAt(i);return(h>>>0).toString(36)+pw.length;}

  try {
    const rows=await sb(`users?username=eq.${encodeURIComponent(u)}&select=*`);
    if(!rows||!rows.length||rows[0].password_hash!==hashPw(p)){showAlert('loginAlert',tr('errNotFound'));return;}
    const user=rows[0];
    setSession({id:user.id,username:user.username,display_name:user.display_name||user.username});
    currentUserData={id:user.id,username:user.username,display_name:user.display_name||user.username};
    document.getElementById('dashName').textContent=currentUserData.display_name;
    showScreen('scrDash');
  } catch(e){showAlert('loginAlert','Error: '+e.message);}
  finally{btn.textContent=tr('btnLogin');btn.disabled=false;}
}

async function doRegister(){
  const u=document.getElementById('regUser').value.trim();
  const dn=document.getElementById('regDisplay').value.trim()||u;
  const p=document.getElementById('regPw').value,cf=document.getElementById('regCf').value;
  if(!u||!p||!cf){showAlert('regAlert',tr('errEmpty'));return;}
  if(u.length<3){showAlert('regAlert',tr('errShort3'));return;}
  if(p.length<6){showAlert('regAlert',tr('errShort6'));return;}
  if(p!==cf){showAlert('regAlert',tr('errNoMatch'));return;}
  const btn=document.getElementById('btnRegister');
  btn.innerHTML='<span class="spin"></span>';btn.disabled=true;
  try {
    const existing=await sb(`users?username=eq.${encodeURIComponent(u)}&select=id`);
    if(existing&&existing.length){showAlert('regAlert',tr('errTaken'));return;}
    const rows=await sb('users',{method:'POST',body:JSON.stringify({username:u,display_name:dn,password_hash:hashPw(p)})});
    const user=rows[0];
    showAlert('regAlert',tr('errCreated'),'ok');
    setTimeout(()=>{
      setSession({id:user.id,username:user.username,display_name:user.display_name||u});
      currentUserData={id:user.id,username:user.username,display_name:user.display_name||u};
      document.getElementById('dashName').textContent=currentUserData.display_name;
      showScreen('scrDash');
    },1000);
  } catch(e){showAlert('regAlert','Error: '+e.message);}
  finally{btn.textContent=tr('btnRegister');btn.disabled=false;}
}

function doLogout(){clrSession();currentUserData=null;viewingUserId=null;showScreen('scrAuth');document.getElementById('loginUser').value='';document.getElementById('loginPw').value='';switchTab('login');}

// ─── Connection check ───
async function checkConn(){
  const dot=document.getElementById('connDot'),st=document.getElementById('connStatus');
  try{await sb('users?select=id&limit=1');dot.classList.remove('offline');st.textContent=tr('connOnline');}

}

// ═══════════════════════════════════════════════════════════
//  FILE HANDLING
// ═══════════════════════════════════════════════════════════
let taskPendingFiles=[], knowPendingFiles=[];

function readFile(file){return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);});}

async function handleFiles(e,scope){const files=Array.from(e.target.files);await addFiles(files,scope);e.target.value='';}
async function handleDrop(e,scope){e.preventDefault();const id=scope==='task'?'taskDrop':'knowDrop';document.getElementById(id).classList.remove('drag');await addFiles(Array.from(e.dataTransfer.files),scope);}
function onDragOver(e,id){e.preventDefault();document.getElementById(id).classList.add('drag');}
function onDragLeave(id){document.getElementById(id).classList.remove('drag');}

async function addFiles(files,scope){
  const pending=scope==='task'?taskPendingFiles:knowPendingFiles;
  for(const f of files){
    if(f.size>5*1024*1024){toast('ไฟล์ใหญ่เกิน 5MB');continue;}
    const dataUrl=await readFile(f);
    pending.push({name:f.name,type:f.type,dataUrl});
  }
  scope==='task'?renderFP(taskPendingFiles,'taskFilePreview','task'):renderFP(knowPendingFiles,'knowFilePreview','know');
}

function renderFP(pending,previewId,scope){
  const c=document.getElementById(previewId);c.innerHTML='';
  pending.forEach((f,i)=>{
    const w=document.createElement('div');w.className='fp-item';
    if(f.type.startsWith('image/')){const img=document.createElement('img');img.src=f.dataUrl;img.alt=f.name;w.appendChild(img);}
    else{const d=document.createElement('div');d.className='fp-file';d.innerHTML=`📄<span>${f.name}</span>`;w.appendChild(d);}
    const del=document.createElement('button');del.className='fp-del';del.textContent='×';
    del.onclick=ev=>{ev.stopPropagation();pending.splice(i,1);scope==='task'?renderFP(taskPendingFiles,'taskFilePreview','task'):renderFP(knowPendingFiles,'knowFilePreview','know');};
    w.appendChild(del);c.appendChild(w);
  });
}

// ═══════════════════════════════════════════════════════════
//  TASKS
// ═══════════════════════════════════════════════════════════
let knowType='note';

async function openModule(mod){
  viewingUserId=null;viewingUserName='';
  if(mod==='share'){await openShareScreen();return;}
  if(mod==='tasks'){
    taskPendingFiles=[];renderFP(taskPendingFiles,'taskFilePreview','task');
    document.getElementById('taskAddCard').style.display='';
    document.getElementById('taskViewerBanner').style.display='none';
    await renderTasks();showScreen('scrTasks');
  } else {
    knowPendingFiles=[];renderFP(knowPendingFiles,'knowFilePreview','know');
    document.getElementById('knowAddCard').style.display='';
    document.getElementById('knowViewerBanner').style.display='none';
    await renderKnow();showScreen('scrKnowledge');
  }
}

async function openSharedModule(ownerUserId, ownerName, mod){
  viewingUserId=ownerUserId;viewingUserName=ownerName;
  if(mod==='tasks'||mod==='all'){
    document.getElementById('taskAddCard').style.display='none';
    document.getElementById('taskViewerBanner').style.display='flex';
    document.getElementById('taskViewerText').textContent=tr('viewingWork',ownerName);
    await renderTasks();showScreen('scrTasks');
  } else {
    document.getElementById('knowAddCard').style.display='none';
    document.getElementById('knowViewerBanner').style.display='flex';
    document.getElementById('knowViewerText').textContent=tr('viewingWork',ownerName);
    await renderKnow();showScreen('scrKnowledge');
  }
}

async function addTask(){
  const title=document.getElementById('taskTitle').value.trim();
  if(!title){toast('กรุณาใส่ชื่องาน');return;}
  const note=document.getElementById('taskNote').value.trim();
  const btn=document.getElementById('btnAddTask');btn.disabled=true;
  try{
    await sb('items',{method:'POST',body:JSON.stringify({user_id:currentUserData.id,module:'tasks',type:'task',title,body:note,files:taskPendingFiles})});
    document.getElementById('taskTitle').value='';document.getElementById('taskNote').value='';
    taskPendingFiles=[];renderFP(taskPendingFiles,'taskFilePreview','task');
    await renderTasks();toast(tr('toastSaved'));
  }catch(e){toast('Error: '+e.message);}
  finally{btn.disabled=false;}
}

async function toggleTask(id,done){
  try{await sb(`items?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({done:!done}),prefer:'return=minimal',headers:{'Prefer':'return=minimal'}});await renderTasks();}
  catch(e){toast('Error: '+e.message);}
}

async function deleteItem(id,module){
  if(!confirm(tr('confirmDel')))return;
  try{await sb(`items?id=eq.${id}`,{method:'DELETE',prefer:'',headers:{'Prefer':''}});
    module==='tasks'?await renderTasks():await renderKnow();toast(tr('toastDeleted'));}
  catch(e){toast('Error: '+e.message);}
}

async function renderTasks(){
  const uid=viewingUserId||currentUserData?.id;
  if(!uid)return;
  const list=document.getElementById('taskList');
  list.innerHTML='<div class="empty"><div class="empty-icon">⏳</div></div>';
  try{
    const tasks=await sb(`items?user_id=eq.${uid}&module=eq.tasks&order=created_at.desc&select=*`);
    if(!tasks||!tasks.length){list.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-txt">${tr('emptyTasks')}</div></div>`;return;}
    list.innerHTML=tasks.map(t=>`
      <div class="item-card ${t.done?'task-done':''}">
        <div class="item-top">
          <div class="task-check">
            ${!viewingUserId?`<input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${t.id}',${t.done})">`:' '}
            <div class="item-title">${esc(t.title)}</div>
          </div>
          ${!viewingUserId?`<div class="item-actions"><button class="icon-btn" onclick="deleteItem('${t.id}','tasks')">🗑</button></div>`:''}
        </div>
        ${t.body?`<div class="item-body">${esc(t.body)}</div>`:''}
        ${renderImages(t.files)}${renderFileChips(t.files)}
        <div class="item-meta">
          <span class="tag task">${tr('tagTask')}</span>
          ${t.done?`<span class="tag" style="background:#d1fae5;color:#065f46">${tr('done')}</span>`:''}
          <span class="item-date">${fmtDate(t.created_at)}</span>
        </div>
      </div>`).join('');
  }catch(e){list.innerHTML=`<div class="empty"><div class="empty-txt">Error: ${e.message}</div></div>`;}
}

//  KNOWLEDGE
// ═══════════════════════════════════════════════════════════
function pickType(type){
  knowType=type;
  document.querySelectorAll('.type-chip').forEach(c=>c.classList.toggle('on',c.dataset.type===type));
  document.getElementById('fieldLink').style.display=type==='link'?'':'none';
  document.getElementById('fieldVideo').style.display=type==='video'?'':'none';
  document.getElementById('fieldKnowFiles').style.display=type==='video'?'none':'';
}

async function addKnow(){
  const title=document.getElementById('knowTitle').value.trim();
  if(!title){toast('กรุณาใส่ชื่อหัวข้อ');return;}
  const body=document.getElementById('knowBody').value.trim();
  const link=document.getElementById('knowLink').value.trim();
  const video=document.getElementById('knowVideo').value.trim();
  let ytId='';
  if(knowType==='video'&&video){const m=video.match(/(?:v=|youtu\.be\/)([^&\s?]+)/);ytId=m?m[1]:'';}
  const btn=document.getElementById('btnAddKnow');btn.disabled=true;
  try{
    await sb('items',{method:'POST',body:JSON.stringify({
      user_id:currentUserData.id,module:'knowledge',type:knowType,title,body,
      link:knowType==='link'?link:'',yt_id:ytId,
      files:knowType!=='video'?knowPendingFiles:[]
    })});
    document.getElementById('knowTitle').value='';document.getElementById('knowBody').value='';
    document.getElementById('knowLink').value='';document.getElementById('knowVideo').value='';
    knowPendingFiles=[];renderFP(knowPendingFiles,'knowFilePreview','know');
    await renderKnow();toast(tr('toastSaved'));
  }catch(e){toast('Error: '+e.message);}
  finally{btn.disabled=false;}
}

async function renderKnow(){
  const uid=viewingUserId||currentUserData?.id;
  if(!uid)return;
  const list=document.getElementById('knowList');
  list.innerHTML='<div class="empty"><div class="empty-icon">⏳</div></div>';
  try{
    const items=await sb(`items?user_id=eq.${uid}&module=eq.knowledge&order=created_at.desc&select=*`);
    if(!items||!items.length){list.innerHTML=`<div class="empty"><div class="empty-icon">🧠</div><div class="empty-txt">${tr('emptyKnow')}</div></div>`;return;}
    list.innerHTML=items.map(item=>`
      <div class="item-card">
        <div class="item-top">
          <div class="item-title">${esc(item.title)}</div>
          ${!viewingUserId?`<div class="item-actions"><button class="icon-btn" onclick="deleteItem('${item.id}','knowledge')">🗑</button></div>`:''}
        </div>
        ${item.body?`<div class="item-body">${esc(item.body)}</div>`:''}
        ${item.link?`<div class="item-link"><a href="${esc(item.link)}" target="_blank" rel="noopener">🔗 ${esc(item.link)}</a></div>`:''}
        ${item.yt_id?`<div class="yt-wrap"><iframe src="https://www.youtube.com/embed/${item.yt_id}" allowfullscreen loading="lazy"></iframe></div>`:''}
        ${renderImages(item.files)}${renderFileChips(item.files)}
        <div class="item-meta">
          <span class="tag ${item.type}">${tr('tag'+item.type.charAt(0).toUpperCase()+item.type.slice(1))}</span>
          <span class="item-date">${fmtDate(item.created_at)}</span>
        </div>
      </div>`).join('');
  }catch(e){list.innerHTML=`<div class="empty"><div class="empty-txt">Error: ${e.message}</div></div>`;}
}

// ═══════════════════════════════════════════════════════════
//  SHARE MODULE
// ═══════════════════════════════════════════════════════════
let shareSearchTimeout=null;
function searchUsers(){
  clearTimeout(shareSearchTimeout);
  const q=document.getElementById('shareSearch').value.trim();
  const dd=document.getElementById('shareDropdown');
  if(!q){dd.classList.remove('on');return;}
  shareSearchTimeout=setTimeout(async()=>{
    try{
      const users=await sb(`users?username=ilike.*${encodeURIComponent(q)}*&select=id,username,display_name&limit=8`);
      const filtered=(users||[]).filter(u=>u.id!==currentUserData?.id);
      if(!filtered.length){dd.innerHTML=`<div class="search-item" style="color:var(--muted)">ไม่พบผู้ใช้ / No users found</div>`;dd.classList.add('on');return;}
      dd.innerHTML=filtered.map(u=>`
        <div class="search-item" onclick="selectShareUser('${u.id}','${esc(u.username)}','${esc(u.display_name||u.username)}')">
          <div class="search-item-name">${esc(u.display_name||u.username)}</div>
          <div class="search-item-user">@${esc(u.username)}</div>
        </div>`).join('');
      dd.classList.add('on');
    }catch(e){}
  },300);
}

function selectShareUser(id,username,displayName){
  shareSelectedUser={id,username,displayName};
  document.getElementById('shareSearch').value='';
  document.getElementById('shareDropdown').classList.remove('on');
  document.getElementById('shareSelAvatar').textContent=displayName.charAt(0).toUpperCase();
  document.getElementById('shareSelName').textContent=displayName;
  document.getElementById('shareSelUser').textContent='@'+username;
  document.getElementById('shareSelectedInfo').style.display='';
  document.getElementById('shareSelectedWrap').style.display='';
  document.getElementById('btnDoShare').style.display='';
}

function clearShareSel(){
  shareSelectedUser=null;
  document.getElementById('shareSelectedInfo').style.display='none';
  document.getElementById('shareSelectedWrap').style.display='none';
  document.getElementById('btnDoShare').style.display='none';
}

function pickShareMod(mod){
  shareSelectedMod=mod;
  document.querySelectorAll('[data-mod]').forEach(c=>c.classList.toggle('on',c.dataset.mod===mod));
}

async function doShare(){
  if(!shareSelectedUser)return;
  const btn=document.getElementById('btnDoShare');btn.disabled=true;
  try{
    await sb('shares',{method:'POST',body:JSON.stringify({owner_id:currentUserData.id,viewer_id:shareSelectedUser.id,module:shareSelectedMod})});
    clearShareSel();await loadShareLists();toast(tr('toastShared'));
  }catch(e){
    if(e.message.includes('unique')||e.message.includes('duplicate'))toast('แชร์ให้คนนี้แล้ว');
    else toast('Error: '+e.message);
  }finally{btn.disabled=false;}
}

async function removeShare(shareId){
  if(!confirm(tr('confirmUnshare')))return;
  try{await sb(`shares?id=eq.${shareId}`,{method:'DELETE',headers:{'Prefer':''}});await loadShareLists();toast(tr('toastUnshared'));}
  catch(e){toast('Error: '+e.message);}
}

async function openShareScreen(){
  showScreen('scrShare');
  await loadShareLists();
}

async function loadShareLists(){
  // shares I created (sharing with others)
  const outList=document.getElementById('sharingWithList');
  outList.innerHTML='<div style="color:var(--subtle);font-size:13px;padding:8px 0">⏳</div>';
  try{
    const shares=await sb(`shares?owner_id=eq.${currentUserData.id}&select=id,module,viewer_id,users!shares_viewer_id_fkey(username,display_name)`);
    if(!shares||!shares.length){outList.innerHTML=`<div style="color:var(--subtle);font-size:13px;padding:8px 0">${tr('noShareOut')}</div>`;return;}
    outList.innerHTML=shares.map(s=>{
      const u=s.users;const dn=u.display_name||u.username;
      const modLabel=s.module==='all'?tr('smodAll'):s.module==='tasks'?tr('mod1Name'):tr('mod2Name');
      return `<div class="share-row">
        <div class="share-avatar">${dn.charAt(0).toUpperCase()}</div>
        <div class="share-info">
          <div class="share-name">${esc(dn)}</div>
          <div class="share-meta">@${esc(u.username)}</div>
        </div>
        <span class="share-badge">${modLabel}</span>
        <button class="icon-btn" onclick="removeShare('${s.id}')" title="Remove share">✕</button>
      </div>`;
    }).join('');
  }catch(e){outList.innerHTML=`<div style="color:var(--error);font-size:13px">${e.message}</div>`;}

  // shares others gave me
  const inList=document.getElementById('sharedToMeList');
  inList.innerHTML='<div style="color:var(--subtle);font-size:13px;padding:8px 0">⏳</div>';
  try{
    const shares=await sb(`shares?viewer_id=eq.${currentUserData.id}&select=id,module,owner_id,users!shares_owner_id_fkey(id,username,display_name)`);
    if(!shares||!shares.length){inList.innerHTML=`<div style="color:var(--subtle);font-size:13px;padding:8px 0">${tr('noShareIn')}</div>`;return;}
    inList.innerHTML=shares.map(s=>{
      const u=s.users;const dn=u.display_name||u.username;
      const modLabel=s.module==='all'?tr('smodAll'):s.module==='tasks'?tr('mod1Name'):tr('mod2Name');
      const openMod=s.module==='all'?'tasks':s.module;
      return `<div class="share-row">
        <div class="share-avatar">${dn.charAt(0).toUpperCase()}</div>
        <div class="share-info">
          <div class="share-name">${esc(dn)}</div>
          <div class="share-meta">@${esc(u.username)}</div>
        </div>
        <span class="share-badge">${modLabel}</span>
        <button class="btn btn-sm" style="margin-left:8px;font-size:12px;padding:6px 12px" onclick="openSharedModule('${u.id}','${esc(dn)}','${openMod}')">ดู →</button>
      </div>`;
    }).join('');
  }catch(e){inList.innerHTML=`<div style="color:var(--error);font-size:13px">${e.message}</div>`;}
}

// ─── Render helpers ───
function renderImages(files){
  const imgs=(files||[]).filter(f=>f.type&&f.type.startsWith('image/'));
  if(!imgs.length)return'';
  return`<div class="item-images">${imgs.map(f=>`<img src="${f.dataUrl}" alt="${esc(f.name)}" onclick="openLB('${f.dataUrl}')">`).join('')}</div>`;
}
function renderFileChips(files){
  const nonImgs=(files||[]).filter(f=>f.type&&!f.type.startsWith('image/'));
  if(!nonImgs.length)return'';
  return`<div class="item-files">${nonImgs.map(f=>`<a class="file-chip" href="${f.dataUrl}" download="${esc(f.name)}">📄 ${esc(f.name)}</a>`).join('')}</div>`;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(iso){try{const d=new Date(iso);return d.toLocaleDateString(lang==='th'?'th-TH':lang==='ja'?'ja-JP':'en-GB',{day:'numeric',month:'short',year:'numeric'});}catch{return iso;}}
function openLB(src){document.getElementById('lbImg').src=src;document.getElementById('lbOverlay').classList.add('on');}
function closeLB(){document.getElementById('lbOverlay').classList.remove('on');}

// close share dropdown on outside click
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))document.getElementById('shareDropdown').classList.remove('on');});
