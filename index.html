<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phattarawech Chotisomran's Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════ */
:root {
  --white: #ffffff;
  --off-white: #fafaf9;
  --gray-50: #f5f5f4;
  --gray-100: #e7e5e4;
  --gray-200: #d6d3d1;
  --gray-400: #a8a29e;
  --gray-500: #78716c;
  --gray-700: #44403c;
  --gray-900: #1c1917;
  --black: #0c0a09;

  --ink: var(--gray-900);
  --ink-muted: var(--gray-500);
  --ink-subtle: var(--gray-400);
  --surface: var(--white);
  --surface-raised: var(--off-white);
  --surface-sunken: var(--gray-50);
  --border: var(--gray-100);
  --border-strong: var(--gray-200);

  --accent: #2563eb;
  --accent-light: #eff6ff;
  --accent-muted: #93c5fd;
  --success: #16a34a;
  --success-light: #f0fdf4;
  --error: #dc2626;
  --error-light: #fef2f2;
  --warn: #d97706;

  --folder-1: #6366f1; --folder-2: #ec4899;
  --folder-3: #f59e0b; --folder-4: #10b981;
  --folder-5: #3b82f6; --folder-6: #8b5cf6;

  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-full: 9999px;

  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.1), 0 4px 12px rgba(0,0,0,.06);
  --shadow-xl: 0 24px 64px rgba(0,0,0,.12);

  --font-serif: 'Geist', 'Noto Sans Thai', 'Noto Sans JP', sans-serif;
  --font-sans: 'Geist', 'Noto Sans Thai', 'Noto Sans JP', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  --t-fast: 120ms;
  --t-base: 200ms;
  --t-slow: 360ms;
  --ease: cubic-bezier(.22,1,.36,1);
}

/* ══════════════════════════════════════
   RESET & BASE
══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--off-white);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ══════════════════════════════════════
   SCREENS
══════════════════════════════════════ */
.screen { display: none; }
.screen.on { display: block; animation: screenIn var(--t-slow) var(--ease) both; }
@keyframes screenIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* ══════════════════════════════════════
   AUTH PAGE
══════════════════════════════════════ */
#scrAuth {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
}
#scrAuth.on { display: grid; }

.auth-left {
  background: var(--black);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 48px;
  position: relative;
  overflow: hidden;
}

.auth-left::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 80%, rgba(99,102,241,.25) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 20%, rgba(236,72,153,.15) 0%, transparent 50%);
}

.auth-brand { position: relative; z-index: 1; }
.auth-brand-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,.4);
  margin-bottom: 12px;
}
.auth-brand-name {
  font-family: var(--font-serif);
  font-size: 36px;
  line-height: 1.15;
  color: #fff;
  font-style: italic;
}
.auth-brand-name em { font-style: normal; color: rgba(255,255,255,.5); display: block; font-size: 28px; }

.auth-quote {
  position: relative;
  z-index: 1;
  font-family: var(--font-serif);
  font-size: 15px;
  font-style: italic;
  color: rgba(255,255,255,.45);
  line-height: 1.6;
  border-left: 2px solid rgba(255,255,255,.15);
  padding-left: 16px;
}

.auth-right {
  background: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px;
}

.auth-form-wrap { width: 100%; max-width: 380px; }

/* Lang bar */
.lang-bar { display: flex; gap: 4px; margin-bottom: 40px; }
.lb {
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-full);
  padding: 4px 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1px;
  color: var(--ink-muted);
  cursor: pointer;
  background: none;
  transition: all var(--t-base);
}
.lb.on { background: var(--ink); color: #fff; border-color: var(--ink); }
.lb:not(.on):hover { border-color: var(--ink); color: var(--ink); }

/* Tabs */
.auth-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
.auth-tab {
  flex: 1; background: none; border: none;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  padding: 10px 0; font-family: var(--font-sans);
  font-size: 13.5px; font-weight: 500;
  color: var(--ink-subtle); cursor: pointer; transition: all var(--t-fast);
}
.auth-tab.on { color: var(--ink); border-bottom-color: var(--ink); }
.auth-tab:not(.on):hover { color: var(--ink-muted); }

/* Form section */
.fsec { display: none; }
.fsec.on { display: block; animation: slideIn var(--t-base) var(--ease) both; }
@keyframes slideIn { from { opacity:0; transform:translateX(8px); } to { opacity:1; transform:translateX(0); } }

.form-title { font-family: var(--font-serif); font-size: 24px; font-weight: 600; letter-spacing: -.4px; margin-bottom: 4px; }
.form-sub { font-size: 13px; color: var(--ink-muted); margin-bottom: 28px; line-height: 1.5; }

/* Field */
.field { margin-bottom: 14px; }
.field-label {
  display: block; font-size: 11.5px; font-weight: 500;
  letter-spacing: .3px; color: var(--ink-muted); margin-bottom: 6px;
  font-family: var(--font-mono);
}
.iw { position: relative; }
.inp {
  width: 100%; background: var(--surface-sunken);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 11px 14px; color: var(--ink); font-family: var(--font-sans);
  font-size: 14px; outline: none;
  transition: border-color var(--t-fast), box-shadow var(--t-fast), background var(--t-fast);
}
.inp:focus {
  background: var(--white); border-color: var(--ink);
  box-shadow: 0 0 0 3px rgba(28,25,23,.07);
}
.inp::placeholder { color: var(--gray-200); }
textarea.inp { resize: vertical; min-height: 80px; }

.tpw {
  position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  font-family: var(--font-mono); font-size: 10.5px; font-weight: 500;
  letter-spacing: .5px; color: var(--ink-subtle); padding: 3px 4px;
  transition: color var(--t-fast);
}
.tpw:hover { color: var(--ink); }

.err-txt { display: none; font-size: 11.5px; color: var(--error); margin-top: 5px; font-family: var(--font-mono); }
.err-txt.on { display: block; }

/* Strength bar */
.str-bar { display: flex; gap: 3px; margin-top: 7px; }
.seg { height: 2px; flex: 1; background: var(--border); border-radius: 2px; transition: background .3s; }
.seg.w { background: var(--error); } .seg.m { background: var(--warn); } .seg.s { background: var(--success); }
.str-note { font-size: 10.5px; color: var(--ink-muted); margin-top: 4px; font-family: var(--font-mono); }

/* Alert */
.alert { display: none; font-size: 13px; padding: 10px 14px; border-radius: var(--radius-sm); margin-bottom: 18px; border: 1px solid; }
.alert.on { display: block; }
.alert.err { color: var(--error); border-color: #fecaca; background: var(--error-light); }
.alert.ok  { color: var(--success); border-color: #bbf7d0; background: var(--success-light); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  border: none; cursor: pointer; font-family: var(--font-sans); font-weight: 600;
  transition: all var(--t-base) var(--ease); white-space: nowrap;
}
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn:active:not(:disabled) { transform: scale(.98); }

.btn-primary {
  background: var(--ink); color: #fff;
  border-radius: var(--radius-sm); padding: 12px 20px;
  font-size: 14px; width: 100%; margin-top: 8px;
  box-shadow: var(--shadow-sm);
}
.btn-primary:hover:not(:disabled) { background: var(--gray-700); box-shadow: var(--shadow-md); }

.btn-ghost {
  background: none; border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); padding: 8px 14px;
  font-size: 13px; color: var(--ink-muted);
}
.btn-ghost:hover { border-color: var(--ink); color: var(--ink); }

.btn-danger {
  background: none; border: 1px solid #fecaca;
  border-radius: var(--radius-sm); padding: 6px 12px;
  font-size: 12px; color: var(--error);
}
.btn-danger:hover { background: var(--error-light); }

.btn-icon {
  background: none; border: none; color: var(--ink-subtle);
  border-radius: var(--radius-sm); padding: 5px 7px; font-size: 14px;
  transition: all var(--t-fast);
}
.btn-icon:hover { color: var(--ink); background: var(--gray-50); }

/* Footer */
.auth-footer { display: flex; align-items: center; gap: 8px; margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 11.5px; color: var(--ink-subtle); font-family: var(--font-mono); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); flex-shrink: 0; animation: pulse 2.5s ease infinite; }
.status-dot.err { background: var(--error); animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* spinner */
.spin { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spinning .7s linear infinite; }
@keyframes spinning { to { transform:rotate(360deg); } }

/* ══════════════════════════════════════
   APP SHELL (Dashboard + Module pages)
══════════════════════════════════════ */
.app-shell {
  min-height: 100vh;
  display: grid;
  grid-template-rows: 56px 1fr;
}
.app-shell.on { display: grid; }

/* Top nav */
.topnav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,.88);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 16px;
}
.nav-logo {
  font-family: var(--font-serif); font-size: 16px; font-weight: 600; letter-spacing: -.3px;
  color: var(--ink); margin-right: 8px; flex-shrink: 0;
}
.nav-breadcrumb {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--ink-muted); flex: 1;
  font-family: var(--font-sans);
}
.nav-breadcrumb .crumb { color: var(--ink-subtle); }
.nav-breadcrumb .sep { color: var(--border-strong); }
.nav-breadcrumb .crumb-current { color: var(--ink); font-weight: 500; }
.nav-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.nav-user {
  display: flex; align-items: center; gap: 8px; padding: 5px 10px;
  border-radius: var(--radius-full); background: var(--surface-sunken);
  border: 1px solid var(--border);
}
.nav-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--ink); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; flex-shrink: 0;
}
.nav-username { font-size: 13px; font-weight: 500; }

/* lang switcher in nav */
.nav-lang { display: flex; gap: 2px; }
.nav-lb {
  background: none; border: none; border-radius: 4px; padding: 4px 7px;
  font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 1px;
  color: var(--ink-subtle); cursor: pointer; transition: all var(--t-fast);
}
.nav-lb.on { background: var(--ink); color: #fff; border-radius: 4px; }

/* ── DASHBOARD ── */
.dash-body { padding: 40px 32px; max-width: 960px; margin: 0 auto; }
.dash-hero { margin-bottom: 48px; }
.dash-greeting-label {
  font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--ink-subtle); margin-bottom: 8px;
}
.dash-greeting-name {
  font-family: var(--font-serif); font-size: 38px; font-weight: 600; letter-spacing: -.8px;
  line-height: 1.1; color: var(--ink);
}

.module-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
}

.module-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  cursor: pointer;
  transition: all var(--t-base) var(--ease);
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.module-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--card-accent, var(--gray-200));
  transition: height var(--t-base);
}
.module-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--border-strong); }
.module-card:hover::before { height: 4px; }
.module-card.dim { opacity: .35; cursor: default; pointer-events: none; }

.module-card-icon { font-size: 28px; margin-bottom: 12px; line-height: 1; }
.module-card-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; letter-spacing: -.2px; }
.module-card-sub { font-size: 12px; color: var(--ink-muted); line-height: 1.4; }
.module-card-badge {
  display: inline-block; margin-top: 10px;
  font-size: 9.5px; font-family: var(--font-mono); font-weight: 500; letter-spacing: .5px;
  background: var(--surface-sunken); color: var(--ink-subtle);
  padding: 2px 7px; border-radius: var(--radius-full);
}

/* ── MODULE PAGE ── */
.module-body { padding: 28px 32px; max-width: 960px; margin: 0 auto; }
.module-page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
.module-page-title { font-family: var(--font-serif); font-size: 26px; font-weight: 650; letter-spacing: -.5px; }

/* Viewer banner */
.viewer-banner {
  display: flex; align-items: center; gap: 10px;
  background: var(--accent-light); border: 1px solid var(--accent-muted);
  border-radius: var(--radius-md); padding: 12px 16px; margin-bottom: 24px;
  font-size: 13px; color: var(--accent);
}

/* ── FOLDER GRID ── */
.folder-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 32px;
}

.folder-card {
  position: relative;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 18px 16px;
  cursor: pointer;
  transition: all var(--t-base) var(--ease);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  min-height: 110px;
  display: flex; flex-direction: column; justify-content: space-between;
}
.folder-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

.folder-card-bg {
  position: absolute; inset: 0;
  opacity: .07;
  transition: opacity var(--t-base);
}
.folder-card:hover .folder-card-bg { opacity: .12; }

.folder-card-top { position: relative; display: flex; align-items: flex-start; justify-content: space-between; }
.folder-icon { font-size: 26px; line-height: 1; }
.folder-menu-btn {
  background: none; border: none; font-size: 16px; color: var(--ink-subtle);
  cursor: pointer; padding: 2px 4px; border-radius: 4px;
  transition: all var(--t-fast); opacity: 0;
}
.folder-card:hover .folder-menu-btn { opacity: 1; }
.folder-menu-btn:hover { background: rgba(0,0,0,.06); }

.folder-card-info { position: relative; }
.folder-name { font-size: 13.5px; font-weight: 600; letter-spacing: -.1px; margin-bottom: 2px; }
.folder-count { font-size: 11px; color: var(--ink-subtle); font-family: var(--font-mono); }

/* Add folder card */
.folder-card.add-folder {
  border-style: dashed; border-color: var(--border-strong);
  background: transparent; box-shadow: none;
  align-items: center; justify-content: center; gap: 8px;
  flex-direction: column; color: var(--ink-subtle);
  transition: all var(--t-base);
}
.folder-card.add-folder:hover { border-color: var(--ink); color: var(--ink); background: var(--surface-sunken); transform: none; box-shadow: none; }
.add-folder-icon { font-size: 24px; line-height: 1; }
.add-folder-label { font-size: 12.5px; font-weight: 500; }

/* ── FOLDER VIEW (items inside folder) ── */
.folder-view-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
}
.folder-view-icon {
  width: 40px; height: 40px; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.folder-view-name { font-family: var(--font-serif); font-size: 22px; font-weight: 650; letter-spacing: -.4px; }

/* Add item inside folder */
.add-item-bar {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px 20px;
  margin-bottom: 20px; box-shadow: var(--shadow-sm);
}
.add-item-bar-title {
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--ink-subtle); margin-bottom: 14px;
}

/* type chips */
.type-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.type-chip {
  border: 1px solid var(--border-strong); border-radius: var(--radius-full);
  padding: 5px 12px; font-size: 12px; font-weight: 500;
  color: var(--ink-muted); cursor: pointer; background: none;
  font-family: var(--font-sans); transition: all var(--t-fast);
}
.type-chip.on { background: var(--ink); color: #fff; border-color: var(--ink); }
.type-chip:not(.on):hover { border-color: var(--ink); color: var(--ink); }

/* drop zone */
.drop-zone {
  border: 1.5px dashed var(--border-strong); border-radius: var(--radius-md);
  padding: 20px; text-align: center; cursor: pointer;
  transition: all var(--t-base); background: var(--surface-sunken);
}
.drop-zone:hover, .drop-zone.drag { border-color: var(--accent); background: var(--accent-light); }
.drop-zone input { display: none; }
.drop-hint { font-size: 12.5px; color: var(--ink-muted); margin-top: 6px; line-height: 1.5; }

/* file preview */
.file-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.fp-item { position: relative; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.fp-item img { width: 64px; height: 64px; object-fit: cover; display: block; }
.fp-file { width: 80px; height: 64px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; font-size: 10px; color: var(--ink-muted); padding: 6px; text-align: center; background: var(--surface-sunken); }
.fp-del { position: absolute; top: 3px; right: 3px; width: 18px; height: 18px; border-radius: 50%; background: rgba(0,0,0,.6); color: #fff; border: none; cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; }

/* item cards */
.items-list { display: flex; flex-direction: column; gap: 10px; }
.item-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 16px 18px;
  transition: all var(--t-fast); box-shadow: var(--shadow-sm);
}
.item-card:hover { border-color: var(--border-strong); }
.item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.item-title { font-size: 14px; font-weight: 600; flex: 1; letter-spacing: -.15px; }
.item-actions { display: flex; gap: 2px; flex-shrink: 0; }
.item-body { margin-top: 8px; font-size: 13px; color: var(--ink-muted); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.item-meta { display: flex; gap: 6px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
.tag { font-size: 10px; font-weight: 500; font-family: var(--font-mono); padding: 2px 8px; border-radius: var(--radius-full); }
.tag.task  { background: #fef9c3; color: #854d0e; }
.tag.note  { background: #dbeafe; color: #1d4ed8; }
.tag.link  { background: #dcfce7; color: #15803d; }
.tag.video { background: #fce7f3; color: #9d174d; }
.tag.file  { background: var(--gray-50); color: var(--gray-700); }
.item-date { font-size: 10.5px; color: var(--ink-subtle); margin-left: auto; font-family: var(--font-mono); }
.task-check { display: flex; align-items: center; gap: 10px; }
.task-check input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--ink); flex-shrink: 0; }
.task-done .item-title { text-decoration: line-through; color: var(--ink-subtle); }
.item-images { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.item-images img { width: 72px; height: 72px; object-fit: cover; border-radius: var(--radius-sm); border: 1px solid var(--border); cursor: pointer; transition: transform var(--t-fast); }
.item-images img:hover { transform: scale(1.05); }
.item-files { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.file-chip { display: flex; align-items: center; gap: 5px; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 11.5px; color: var(--ink-muted); text-decoration: none; transition: all var(--t-fast); }
.file-chip:hover { border-color: var(--ink); color: var(--ink); }
.item-link a { display: inline-block; margin-top: 8px; color: var(--accent); font-size: 13px; word-break: break-all; text-decoration: none; }
.item-link a:hover { text-decoration: underline; }
.yt-wrap { margin-top: 10px; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); }
.yt-wrap iframe { display: block; width: 100%; aspect-ratio: 16/9; border: none; }

/* empty */
.empty { text-align: center; padding: 48px 24px; color: var(--ink-subtle); }
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .4; display: block; }
.empty-txt { font-size: 13.5px; }

/* ── SHARE MODULE ── */
.share-section { margin-bottom: 32px; }
.section-title-label {
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--ink-subtle); margin-bottom: 14px;
}
.search-wrap { position: relative; }
.search-dropdown {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius-md); box-shadow: var(--shadow-lg);
  z-index: 200; max-height: 220px; overflow-y: auto; display: none;
}
.search-dropdown.on { display: block; }
.search-item { padding: 10px 14px; cursor: pointer; transition: background var(--t-fast); }
.search-item:hover { background: var(--surface-sunken); }
.search-item-name { font-size: 13px; font-weight: 500; }
.search-item-user { font-size: 11px; color: var(--ink-muted); font-family: var(--font-mono); }

.share-list { display: flex; flex-direction: column; gap: 8px; }
.share-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; background: var(--white);
  border: 1px solid var(--border); border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
}
.share-avatar {
  width: 34px; height: 34px; border-radius: 50%; background: var(--ink);
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0; text-transform: uppercase;
}
.share-info { flex: 1; }
.share-name { font-size: 13.5px; font-weight: 600; }
.share-meta { font-size: 11px; color: var(--ink-muted); font-family: var(--font-mono); margin-top: 1px; }
.share-badge {
  font-size: 10px; font-family: var(--font-mono); font-weight: 500;
  padding: 3px 8px; border-radius: var(--radius-full);
  background: var(--accent-light); color: var(--accent);
}
.share-folder-badge {
  font-size: 10px; font-family: var(--font-mono); padding: 2px 7px;
  border-radius: var(--radius-full); background: var(--surface-sunken); color: var(--ink-muted);
  margin-left: 4px;
}

/* selected user info */
.selected-user-box {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border: 1px solid var(--border);
  border-radius: var(--radius-md); margin-bottom: 14px;
  background: var(--surface-sunken);
}

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--ink); color: #fff; padding: 10px 20px;
  border-radius: var(--radius-md); font-size: 13px; font-weight: 500;
  opacity: 0; transition: all .3s var(--ease); pointer-events: none; z-index: 9999;
  box-shadow: var(--shadow-lg); white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Lightbox */
.lb-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.88); z-index: 9998;
  align-items: center; justify-content: center; cursor: zoom-out;
}
.lb-overlay.on { display: flex; }
.lb-overlay img { max-width: 90vw; max-height: 90vh; border-radius: var(--radius-md); object-fit: contain; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4); z-index: 500;
  align-items: center; justify-content: center; padding: 24px;
}
.modal-overlay.on { display: flex; }
.modal {
  background: var(--white); border-radius: var(--radius-xl);
  padding: 28px; width: 100%; max-width: 420px;
  box-shadow: var(--shadow-xl);
  animation: modalIn .25s var(--ease) both;
}
@keyframes modalIn { from { opacity:0; transform:scale(.95) translateY(8px); } to { opacity:1; transform:scale(1) translateY(0); } }
.modal-title { font-family: var(--font-serif); font-size: 20px; font-weight: 650; letter-spacing: -.3px; margin-bottom: 20px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

/* color picker */
.color-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.color-swatch {
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent;
  transition: all var(--t-fast);
}
.color-swatch.on { border-color: var(--ink); transform: scale(1.15); }

/* ── RESPONSIVE ── */
@media (max-width: 720px) {
  #scrAuth { grid-template-columns: 1fr; }
  .auth-left { display: none; }
  .auth-right { padding: 32px 24px; align-items: flex-start; }
  .dash-body, .module-body { padding: 20px 16px; }
  .folder-grid { grid-template-columns: repeat(2, 1fr); }
  .module-grid { grid-template-columns: repeat(2, 1fr); }
  .dash-greeting-name { font-size: 30px; }
}
</style>

// ─── i18n ───
function tr(key, arg) { const v = TR[key]?.[lang]; return typeof v === 'function' ? v(arg) : (v ?? ''); }

function applyLang() {
  const ids = ['tabLogin','tabRegister','loginTitle','loginSub','lbLoginUser','lbLoginPw','btnLogin',
    'regTitle','regSub','lbRegUser','lbRegDisplay','lbRegPw','lbRegCf','btnRegister',
    'lbFolderName','lbFolderColor','btnModalCancel','btnModalSave','btnLogout'];
  ids.forEach(id => { const el = document.getElementById(id); if(el) el.textContent = tr(id); });
  const q = document.getElementById('authQuote');
  if(q) q.innerHTML = tr('authQuote').replace(/\n/g,'<br>');
  const ph = {loginUser:'phLoginUser',loginPw:'phLoginPw',regUser:'phRegUser',regDisplay:'phRegDisplay',regPw:'phRegPw',regCf:'phRegCf'};
  Object.entries(ph).forEach(([id,k]) => { const el = document.getElementById(id); if(el) el.placeholder = tr(k); });
  ['tpwLogin','tpwReg','tpwCf'].forEach(id => { const btn = document.getElementById(id); if(!btn)return; btn.textContent = pwState[id] ? tr('hide') : tr('show'); });
  document.querySelectorAll('.lb,.nav-lb').forEach(b => b.classList.toggle('on', b.textContent.trim() === lang.toUpperCase()));
  checkStr();
  // Re-render current page if in app
  if(document.getElementById('scrApp').classList.contains('on')) renderCurrentPage();
}
function setLang(l) { lang = l; applyLang(); }

// ─── Auth UI helpers ───
function switchTab(tab) {
  document.getElementById('secLogin').classList.toggle('on', tab==='login');
  document.getElementById('secRegister').classList.toggle('on', tab==='register');
  document.getElementById('tabLogin').classList.toggle('on', tab==='login');
  document.getElementById('tabRegister').classList.toggle('on', tab==='register');
  hideAlert('loginAlert'); hideAlert('regAlert');
}
function showAlert(id,msg,type='err'){const el=document.getElementById(id);el.className=`alert ${type} on`;el.querySelector('span').textContent=msg;}
function hideAlert(id){document.getElementById(id).classList.remove('on');}
function togglePw(inp,btn){const i=document.getElementById(inp),b=document.getElementById(btn);const s=i.type==='text';i.type=s?'password':'text';pwState[btn]=!s;b.textContent=!s?tr('hide'):tr('show');}
function valUser(){const v=document.getElementById('regUser').value.trim(),el=document.getElementById('userErr');let m='';if(v&&v.length<3)m=tr('errShort3');else if(v&&!/^[a-zA-Z0-9ก-๙_]+$/.test(v))m=tr('errChars');el.textContent=m;el.classList.toggle('on',!!m);}
function checkStr(){const pw=document.getElementById('regPw')?.value??'';const segs=[1,2,3,4].map(i=>document.getElementById('s'+i));if(!segs[0])return;segs.forEach(s=>s.className='seg');const note=document.getElementById('strNote');if(!pw){note.textContent='';return;}let sc=0;if(pw.length>=6)sc++;if(pw.length>=10)sc++;if(/[A-Z]/.test(pw)||/\d/.test(pw))sc++;if(/[^A-Za-z0-9]/.test(pw))sc++;const cls=['w','w','m','s'],lbls=[null,'strWeak','strMedium','strGood','strStrong'];for(let i=0;i<sc;i++)segs[i].classList.add(cls[sc-1]);note.textContent=lbls[sc]?`Strength: ${tr(lbls[sc])}`:'';};
function checkCf(){const m=document.getElementById('regPw').value===document.getElementById('regCf').value,cf=document.getElementById('regCf').value,el=document.getElementById('cfErr');el.textContent=cf&&!m?tr('errNoMatch'):'';el.classList.toggle('on',!!cf&&!m);}
function hashPw(pw){let h=5381;for(let i=0;i<pw.length;i++)h=(h*33)^pw.charCodeAt(i);return(h>>>0).toString(36)+pw.length;}

// ─── Connection check ───
async function checkConn(){
  const dot=document.getElementById('statusDot'),st=document.getElementById('statusTxt');
  try{await sb('users?select=id&limit=1');dot.classList.remove('err');st.textContent=tr('connOnline');}
  catch{dot.classList.add('err');st.textContent=tr('connOffline');}
}

// ─── Auth actions ───
async function doLogin(){
  const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPw').value;
  if(!u||!p){showAlert('loginAlert',tr('errEmpty'));return;}
  const btn=document.getElementById('btnLogin');btn.innerHTML='<span class="spin"></span>';btn.disabled=true;
  try{
    const rows=await sb(`users?username=eq.${encodeURIComponent(u)}&select=*`);
    if(!rows?.length||rows[0].password_hash!==hashPw(p)){showAlert('loginAlert',tr('errNotFound'));return;}
    loginUser(rows[0]);
  }catch(e){showAlert('loginAlert','Error: '+e.message);}
  finally{btn.textContent=tr('btnLogin');btn.disabled=false;}
}

async function doRegister(){
  const u=document.getElementById('regUser').value.trim();
  const dn=document.getElementById('regDisplay').value.trim()||u;
  const p=document.getElementById('regPw').value,cf=document.getElementById('regCf').value;
  if(!u||!p||!cf){showAlert('regAlert',tr('errEmpty'));return;}
  if(u.length<3){showAlert('regAlert',tr('errShort3'));return;}
  if(p.length<6){showAlert('regAlert',tr('errShort6'));return;}
  if(p!==cf){showAlert('regAlert',tr('errNoMatch'));return;}
  const btn=document.getElementById('btnRegister');btn.innerHTML='<span class="spin"></span>';btn.disabled=true;
  try{
    const ex=await sb(`users?username=eq.${encodeURIComponent(u)}&select=id`);
    if(ex?.length){showAlert('regAlert',tr('errTaken'));return;}
    const rows=await sb('users',{method:'POST',body:JSON.stringify({username:u,display_name:dn,password_hash:hashPw(p)})});
    showAlert('regAlert',tr('errCreated'),'ok');
    setTimeout(()=>loginUser(rows[0]),1000);
  }catch(e){showAlert('regAlert','Error: '+e.message);}
  finally{btn.textContent=tr('btnRegister');btn.disabled=false;}
}

function loginUser(user){
  currentUser={id:user.id,username:user.username,display_name:user.display_name||user.username};
  setSess(currentUser);
  document.getElementById('navAvatar').textContent=currentUser.display_name.charAt(0).toUpperCase();
  document.getElementById('navUsername').textContent=currentUser.display_name;
  showApp('home');
}

function doLogout(){clrSess();currentUser=null;currentModule=null;currentFolder=null;viewingUserId=null;showScreen('scrAuth');}

  const modColor = mod==='tasks' ? '#6366f1' : '#10b981';

  if(!currentFolder){
    // ── FOLDER LIST VIEW ──

      {label:tr('backHome'),onclick:"showApp('home')"},
      {label:modName}
    ]);

    const content = document.getElementById('pageContent');
    content.innerHTML = `<div class="module-body">
      ${isViewer?`<div class="viewer-banner">👁 ${tr('viewingWork',viewingUserName)}</div>`:''}

      const counts = {};
      if(folders?.length){
        const ids = folders.map(f=>f.id);
        const items = await sb(`items?user_id=eq.${uid}&module=eq.${mod}&folder_id=in.(${ids.join(',')})&select=id,folder_id`);
        (items||[]).forEach(i=>{ counts[i.folder_id]=(counts[i.folder_id]||0)+1; });
      }
      const grid = document.getElementById('folderGrid');
      let html = (folders||[]).map(f=>`
        <div class="folder-card" onclick="openFolder('${mod}','${f.id}','${esc(f.name)}','${f.color}')">
          <div class="folder-card-bg" style="background:${f.color}"></div>
          <div class="folder-card-top">
            <div class="folder-icon">📁</div>
            ${!isViewer?`<button class="folder-menu-btn" onclick="event.stopPropagation();deleteFolder('${f.id}','${mod}')">🗑</button>`:''}
          </div>
          <div class="folder-card-info">
            <div class="folder-name" style="color:${f.color}">${esc(f.name)}</div>
            <div class="folder-count">${counts[f.id]||0} items</div>

      if(!folders?.length && isViewer) html = `<div class="empty"><span class="empty-icon">📁</span><div class="empty-txt">${tr('emptyFolders')}</div></div>`;
      grid.innerHTML = html;
    }catch(e){document.getElementById('folderGrid').innerHTML=`<div style="color:var(--error);font-size:13px">Error: ${e.message}</div>`;}

  } else {
    // ── ITEMS INSIDE FOLDER ──
    const f = currentFolder;

      {label:tr('backHome'),onclick:"showApp('home')"},
      {label:modName,onclick:`showApp('${mod}')`},

      ${renderImages(item.files)}${renderFileChips(item.files)}
      <div class="item-meta">
        <span class="tag ${item.type}">${tr('tag'+item.type.charAt(0).toUpperCase()+item.type.slice(1))}</span>
        <span class="item-date">${fmtDate(item.created_at)}</span>
      </div>
    </div>`;
}

// ─── Add item ───
async function addItem(mod){
  const title = document.getElementById('itemTitle')?.value.trim();
  if(!title){toast('กรุณาใส่ชื่อ');return;}
  const body = document.getElementById('itemBody')?.value.trim()||'';
  const link = document.getElementById('itemLink')?.value.trim()||'';
  const videoUrl = document.getElementById('itemVideo')?.value.trim()||'';
  let ytId='';
  if(mod==='knowledge'&&knowType==='video'&&videoUrl){const m=videoUrl.match(/(?:v=|youtu\.be\/)([^&\s?]+)/);ytId=m?m[1]:'';}
  const files = mod==='tasks' ? taskPendingFiles : knowPendingFiles;
  try{
    await sb('items',{method:'POST',body:JSON.stringify({
      user_id:currentUser.id, module:mod, folder_id:currentFolder.id,
      type: mod==='tasks'?'task':knowType,
      title, body,
      link: knowType==='link'?link:'',
      yt_id: ytId,
      files: knowType==='video'?[]:files,
      done: false
    })});
    document.getElementById('itemTitle').value='';
    if(document.getElementById('itemBody')) document.getElementById('itemBody').value='';
    if(document.getElementById('itemLink')) document.getElementById('itemLink').value='';
    if(document.getElementById('itemVideo')) document.getElementById('itemVideo').value='';
    taskPendingFiles=[]; knowPendingFiles=[];
    renderFP([],mod);
    await loadItems(mod, currentUser.id, currentFolder.id);
    toast(tr('toastSaved'));
  }catch(e){toast('Error: '+e.message);}
}

async function toggleTask(id, done){
  try{await sb(`items?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({done:!done}),headers:{'Prefer':'return=minimal'}});
    await loadItems('tasks', currentUser.id, currentFolder.id);}
  catch(e){toast('Error: '+e.message);}
}

async function deleteItem(id, mod){
  if(!confirm(tr('confirmDel')))return;
  try{await sb(`items?id=eq.${id}`,{method:'DELETE',headers:{'Prefer':''}});
    await loadItems(mod, currentUser.id, currentFolder.id);toast(tr('toastDeleted'));}
  catch(e){toast('Error: '+e.message);}
}

// ─── Folders ───
function openFolderModal(mod){
  folderModalModule=mod; folderColorSel=FOLDER_COLORS[0];
  document.getElementById('folderNameInp').value='';
  document.getElementById('folderModalTitle').textContent=tr('newFolder');
  const cr=document.getElementById('colorRow');
  cr.innerHTML=FOLDER_COLORS.map(c=>`<div class="color-swatch ${c===folderColorSel?'on':''}" style="background:${c}" onclick="pickFolderColor('${c}')"></div>`).join('');
  document.getElementById('folderModal').classList.add('on');
  setTimeout(()=>document.getElementById('folderNameInp').focus(),50);
}
function closeFolderModal(){document.getElementById('folderModal').classList.remove('on');}
function pickFolderColor(c){folderColorSel=c;document.querySelectorAll('.color-swatch').forEach(s=>s.classList.toggle('on',s.style.background===c));}
async function saveFolder(){
  const name=document.getElementById('folderNameInp').value.trim();
  if(!name){toast('กรุณาใส่ชื่อแฟ้ม');return;}
  try{await sb('folders',{method:'POST',body:JSON.stringify({user_id:currentUser.id,module:folderModalModule,name,color:folderColorSel})});
    closeFolderModal(); await renderModulePage(folderModalModule);toast(tr('toastSaved'));}
  catch(e){toast('Error: '+e.message);}
}
async function deleteFolder(id, mod){
  if(!confirm(tr('confirmDelFolder')))return;
  try{await sb(`items?folder_id=eq.${id}`,{method:'DELETE',headers:{'Prefer':''}});
    await sb(`folders?id=eq.${id}`,{method:'DELETE',headers:{'Prefer':''}});
    await renderModulePage(mod); toast(tr('toastDeleted'));}
  catch(e){toast('Error: '+e.message);}
}

// ═══════════════════════════════════════════
//  FILE HANDLING
// ═══════════════════════════════════════════
function readFile(f){return new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(f);});}
async function handleFiles(e,scope){await addFiles(Array.from(e.target.files),scope);e.target.value='';}
async function handleDrop(e,scope){e.preventDefault();onDragLeave('itemDrop');await addFiles(Array.from(e.dataTransfer.files),scope||'task');}
function onDragOver(e,id){e.preventDefault();document.getElementById(id)?.classList.add('drag');}
function onDragLeave(id){document.getElementById(id)?.classList.remove('drag');}
async function addFiles(files,scope){
  const pending=scope==='know'?knowPendingFiles:taskPendingFiles;
  for(const f of files){if(f.size>5*1024*1024){toast('ไฟล์ใหญ่เกิน 5MB');continue;}const d=await readFile(f);pending.push({name:f.name,type:f.type,dataUrl:d});}
  renderFP(scope==='know'?knowPendingFiles:taskPendingFiles, scope);
}
function renderFP(pending,scope){
  const c=document.getElementById('itemFilePreview'); if(!c)return;
  c.innerHTML='';
  pending.forEach((f,i)=>{
    const w=document.createElement('div');w.className='fp-item';
    if(f.type.startsWith('image/')){const img=document.createElement('img');img.src=f.dataUrl;img.alt=f.name;w.appendChild(img);}
    else{const d=document.createElement('div');d.className='fp-file';d.innerHTML=`📄<span style="margin-top:3px">${f.name}</span>`;w.appendChild(d);}
    const del=document.createElement('button');del.className='fp-del';del.textContent='×';
    del.onclick=ev=>{ev.stopPropagation();pending.splice(i,1);renderFP(pending,scope);};
    w.appendChild(del);c.appendChild(w);
  });
}
function renderImages(files){const imgs=(files||[]).filter(f=>f.type?.startsWith('image/'));if(!imgs.length)return'';return`<div class="item-images">${imgs.map(f=>`<img src="${f.dataUrl}" alt="${esc(f.name)}" onclick="openLB('${f.dataUrl}')">`).join('')}</div>`;}
function renderFileChips(files){const nI=(files||[]).filter(f=>f.type&&!f.type.startsWith('image/'));if(!nI.length)return'';return`<div class="item-files">${nI.map(f=>`<a class="file-chip" href="${f.dataUrl}" download="${esc(f.name)}">📄 ${esc(f.name)}</a>`).join('')}</div>`;}

// ═══════════════════════════════════════════
//  SHARE MODULE
// ═══════════════════════════════════════════
let shareSearchTimer=null;

async function renderSharePage(){
  setBreadcrumb([{label:tr('backHome'),onclick:"showApp('home')"},{label:tr('shareTitle')}]);
  document.getElementById('pageContent').innerHTML=`
    <div class="module-body">
      <div class="module-page-header"><div class="module-page-title" style="">${tr('shareTitle')}</div></div>

      <div class="share-section">
        <div class="add-item-bar">
          <div class="add-item-bar-title">${tr('shareTitle').toUpperCase()}</div>
          <div class="field">
            <label class="field-label">${tr('lbShareSearch')}</label>
            <div class="search-wrap">
              <input class="inp" type="text" id="shareSearch" placeholder="${tr('phShareSearch')}" oninput="searchUsers()" autocomplete="off">
              <div class="search-dropdown" id="shareDropdown"></div>
            </div>
          </div>
          <div id="shareSelBox" style="display:none"></div>
          <div id="shareScopeWrap" style="display:none">
            <div class="field">
              <label class="field-label">${tr('lbShareScope')}</label>
              <div class="type-row">
                <button class="type-chip on" data-mod="all"       onclick="pickShareMod('all')">${tr('smodAll')}</button>
                <button class="type-chip"    data-mod="tasks"     onclick="pickShareMod('tasks')">${tr('smodTasks')}</button>
                <button class="type-chip"    data-mod="knowledge" onclick="pickShareMod('knowledge')">${tr('smodKnow')}</button>
              </div>
            </div>
            <div style="display:flex;justify-content:flex-end">
              <button class="btn btn-primary" style="width:auto;margin-top:0" onclick="doShare()">${tr('btnShare')}</button>
            </div>
          </div>
        </div>
      </div>

      <div class="share-section">
        <div class="section-title-label">${tr('sharingWith')}</div>
        <div class="share-list" id="listOut"><div style="color:var(--ink-subtle);font-size:13px">⏳</div></div>
      </div>
      <div class="share-section" style="margin-top:28px">
        <div class="section-title-label">${tr('sharedToMe')}</div>
        <div class="share-list" id="listIn"><div style="color:var(--ink-subtle);font-size:13px">⏳</div></div>
      </div>
    </div>`;

  shareSelUser=null; shareSelMod='all';
  await loadShareLists();
  document.addEventListener('click', outsideShareClick);
}

function outsideShareClick(e){if(!e.target.closest('.search-wrap'))document.getElementById('shareDropdown')?.classList.remove('on');}

function searchUsers(){
  clearTimeout(shareSearchTimer);
  const q=document.getElementById('shareSearch')?.value.trim();
  const dd=document.getElementById('shareDropdown');
  if(!q){dd?.classList.remove('on');return;}
  shareSearchTimer=setTimeout(async()=>{
    try{
      const users=await sb(`users?username=ilike.*${encodeURIComponent(q)}*&select=id,username,display_name&limit=8`);
      const filtered=(users||[]).filter(u=>u.id!==currentUser.id);
      if(!filtered.length){dd.innerHTML=`<div class="search-item" style="color:var(--ink-muted)">ไม่พบผู้ใช้</div>`;dd.classList.add('on');return;}
      dd.innerHTML=filtered.map(u=>`
        <div class="search-item" onclick="selectShareUser('${u.id}','${esc(u.username)}','${esc(u.display_name||u.username)}')">
          <div class="search-item-name">${esc(u.display_name||u.username)}</div>
          <div class="search-item-user">@${esc(u.username)}</div>
        </div>`).join('');
      dd.classList.add('on');
    }catch(e){}
  },300);
}

function selectShareUser(id,username,dn){
  shareSelUser={id,username,dn};
  document.getElementById('shareSearch').value='';
  document.getElementById('shareDropdown').classList.remove('on');
  document.getElementById('shareSelBox').style.display='';
  document.getElementById('shareSelBox').innerHTML=`
    <div class="selected-user-box">
      <div class="share-avatar">${dn.charAt(0).toUpperCase()}</div>
      <div class="share-info"><div class="share-name">${esc(dn)}</div><div class="share-meta">@${esc(username)}</div></div>
      <button class="btn-icon" onclick="clearShareSel()" style="margin-left:auto">✕</button>
    </div>`;
  document.getElementById('shareScopeWrap').style.display='';
}

function clearShareSel(){shareSelUser=null;document.getElementById('shareSelBox').style.display='none';document.getElementById('shareScopeWrap').style.display='none';}
function pickShareMod(mod){shareSelMod=mod;document.querySelectorAll('[data-mod]').forEach(c=>c.classList.toggle('on',c.dataset.mod===mod));}

async function doShare(){
  if(!shareSelUser)return;
  try{
    await sb('shares',{method:'POST',body:JSON.stringify({owner_id:currentUser.id,viewer_id:shareSelUser.id,module:shareSelMod})});
    clearShareSel(); await loadShareLists(); toast(tr('toastShared'));
  }catch(e){
    if(e.message.includes('unique')||e.message.includes('duplicate'))toast('แชร์ให้คนนี้แล้ว');
    else toast('Error: '+e.message);
  }
}

async function removeShare(id){
  if(!confirm(tr('confirmUnshare')))return;
  try{await sb(`shares?id=eq.${id}`,{method:'DELETE',headers:{'Prefer':''}});await loadShareLists();toast(tr('toastUnshared'));}
  catch(e){toast('Error: '+e.message);}
}

async function loadShareLists(){
  const outEl=document.getElementById('listOut'), inEl=document.getElementById('listIn');
  if(!outEl)return;
  try{
    const out=await sb(`shares?owner_id=eq.${currentUser.id}&select=id,module,users!shares_viewer_id_fkey(id,username,display_name)`);
    if(!out?.length){outEl.innerHTML=`<div style="color:var(--ink-subtle);font-size:13px;padding:8px 0">${tr('noShareOut')}</div>`;}
    else outEl.innerHTML=out.map(s=>{
      const u=s.users,dn=u.display_name||u.username;
      const ml=s.module==='all'?tr('smodAll'):s.module==='tasks'?tr('smodTasks'):tr('smodKnow');
      return`<div class="share-row">
        <div class="share-avatar">${dn.charAt(0).toUpperCase()}</div>
        <div class="share-info"><div class="share-name">${esc(dn)}</div><div class="share-meta">@${esc(u.username)}</div></div>
        <span class="share-badge">${ml}</span>
        <button class="btn-icon" onclick="removeShare('${s.id}')">✕</button>
      </div>`;
    }).join('');
  }catch(e){outEl.innerHTML=`<div style="color:var(--error);font-size:13px">${e.message}</div>`;}

  try{
    const inShares=await sb(`shares?viewer_id=eq.${currentUser.id}&select=id,module,users!shares_owner_id_fkey(id,username,display_name)`);
    if(!inShares?.length){inEl.innerHTML=`<div style="color:var(--ink-subtle);font-size:13px;padding:8px 0">${tr('noShareIn')}</div>`;}
    else inEl.innerHTML=inShares.map(s=>{
      const u=s.users,dn=u.display_name||u.username;
      const ml=s.module==='all'?tr('smodAll'):s.module==='tasks'?tr('smodTasks'):tr('smodKnow');
      const openMod=s.module==='all'?'tasks':s.module;
      return`<div class="share-row">
        <div class="share-avatar" style="background:#6366f1">${dn.charAt(0).toUpperCase()}</div>
        <div class="share-info"><div class="share-name">${esc(dn)}</div><div class="share-meta">@${esc(u.username)}</div></div>
        <span class="share-badge">${ml}</span>
        <button class="btn btn-primary" style="width:auto;margin-top:0;padding:6px 14px;font-size:12px;margin-left:8px"
          onclick="showApp('${openMod}',{viewingUserId:'${u.id}',viewingUserName:'${esc(dn)}'})">
          ${tr('viewBtn')} →
        </button>
      </div>`;
    }).join('');
  }catch(e){inEl.innerHTML=`<div style="color:var(--error);font-size:13px">${e.message}</div>`;}
}

// ─── Helpers ───
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(iso){try{return new Date(iso).toLocaleDateString(lang==='th'?'th-TH':lang==='ja'?'ja-JP':'en-GB',{day:'numeric',month:'short',year:'numeric'});}catch{return iso;}}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
setLang('th');
checkConn();

const sess=getSess();
if(sess){
  currentUser={id:sess.id,username:sess.username,display_name:sess.display_name};
  document.getElementById('navAvatar').textContent=currentUser.display_name.charAt(0).toUpperCase();
  document.getElementById('navUsername').textContent=currentUser.display_name;
  document.getElementById('btnLogout').textContent=tr('btnLogout');
  showApp('home');
}

document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  if(document.getElementById('secLogin').classList.contains('on'))doLogin();
  else if(document.getElementById('secRegister').classList.contains('on'))doRegister();
  else if(document.getElementById('folderModal').classList.contains('on'))saveFolder();
});
